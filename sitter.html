/* LAYOUT */

.field{display:flex;flex-direction:column;gap:4px;}

/* PHOTO UPLOAD - FIXED for mobile */


/* EMOTION TAGS */

/* BTNS */
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--pk6),var(--pk));

.submit-btn:hover{transform:translateY(-2px);}
.close-btn{width:100%;padding:11px;background:var(--pk4);color:var(--tl);

// Safe error message extractor — never touches Headers or non-serialisable fields
function _errMsg(e){
  if(!e) return 'unknown error';
  if(typeof e==='string') return e;
  // Extract only plain-string fields
  const msg=e.message||e.msg||'';
  const code=e.code||e.status_code||'';
  const hint=e.hint||e.details||'';
  return [msg,code?`[${code}]`:'',hint].filter(Boolean).join(' ').trim()||'Supabase error';
}

// ── Supabase helpers ──
async function dbGetOrders(){
  const{data,error}=await _supa.from('orders').select('*').order('id',{ascending:false});
  if(error){console.error('getOrders:',_errMsg(error));return[];}
  return(data||[]).map(dbRowToOrder);
}
async function dbInsertOrder(b){
  const row=orderToDbRow(b);
  const{error}=await _supa.from('orders').insert([row]);
  if(error){const m=_errMsg(error);console.error('insertOrder:',m);throw new Error(m);}
}
async function dbUpdateOrder(id,fields){
  const row={};
  if(fields.status!==undefined)row.status=fields.status;
  if(fields.assigned_to!==undefined)row.assigned_to=fields.assigned_to;
  const{error}=await _supa.from('orders').update(row).eq('id',id);
  if(error)console.error('updateOrder:',_errMsg(error));
}

  const{error}=await _supa.from('orders').delete().eq('id',id);

  let q=_supa.from('reports').select('*').order('ts',{ascending:false});
  if(bookId)q=q.eq('book_id',bookId);
  const{data,error}=await q;
  if(error){console.error('getReports:',_errMsg(error));return[];}
  return(data||[]).map(r=>({
    ts:r.ts,bookId:r.book_id,bookName:r.book_name,sitter:r.sitter,
    date:r.date,timeStart:r.time_start,timeEnd:r.time_end,
    petReports:r.pet_reports||[],services:r.services||[],
    disinfect:r.disinfect||[],safety:r.safety||[],diary:r.diary||'',
    petPhotos:r.pet_photos||[],cleanPhotos:r.clean_photos||[],
    videoDataUrl:r.video_data_url||'',
    hasVideo:!!(r.video_data_url)
  }));
}

  const row={

    diary:  String(r.diary||''),

    clean_photos: Array.isArray(r.cleanPhotos)?r.cleanPhotos:[],
    video_data_url: String(r.videoDataUrl||'')
  };

// ── Row ↔ Object converters ──
function orderToDbRow(b){
  return{
    id:b.id,ts:b.ts,
    owner_name:b.ownerName,owner_phone:b.ownerPhone,
    owner_line:b.ownerLine||'',owner_addr:b.ownerAddr||'',
    pet_data:b.petData||[],cat_count:b.catCount||0,dog_count:b.dogCount||0,
    pet_notes:b.petNotes||'',

    days:b.days||1,tpd:b.tpd||1,
    services:b.services||[],addons:b.addons||[],
    urgent:b.urgent||0,distance:b.distance||0,
    transport:b.transport||0,transport_total:b.transportTotal||0,
    is_holiday:b.isHoliday||false,
    coupon_used:b.couponUsed||'',ref_code:b.refCode||'',
    discounts:b.discounts||0,total:b.total||0,
    status:b.status||'待確認',assigned_to:b.assignedTo||''
  };
}
function dbRowToOrder(r){

    id:r.id,ts:r.ts,
    ownerName:r.owner_name,ownerPhone:r.owner_phone,
    ownerLine:r.owner_line,ownerAddr:r.owner_addr,

    petNotes:r.pet_notes||'',
    startDate:r.start_date,endDate:r.end_date,
    days:r.days||1,tpd:r.tpd||1,
    services:r.services||[],addons:r.addons||[],
    urgent:r.urgent||0,distance:r.distance||0,
    transport:r.transport||0,transportTotal:r.transport_total||0,
    isHoliday:r.is_holiday||false,

// ── DATE SLOT DISPLAY ──
function formatDateSlots(dateSlotData){
  if(!dateSlotData||!dateSlotData.length) return '';
  const SLOT_NAMES={morning:'早上🌅',noon:'中午☀️',evening:'晚上🌙'};
  const dayNames=['日','一','二','三','四','五','六'];
  return dateSlotData.map(d=>{
    const day=new Date(d.date+'T00:00:00');
    const slots=(d.slots||[]).map(s=>SLOT_NAMES[s]||s).join('、');
    return `${d.date.slice(5)}(${dayNames[day.getDay()]}) ${slots}`;
  }).join(' ／ ');
}

function renderDateSlotsHtml(dateSlotData){
  if(!dateSlotData||!dateSlotData.length) return '<span style="color:var(--tl);">—</span>';
  const SLOT_COLORS={morning:'background:#FFF8D0;color:#8B6800;border:1px solid #FFB800;',noon:'background:#FFF0F5;color:var(--pk);border:1px solid var(--pk3);',evening:'background:#EEF0FF;color:#5558B8;border:1px solid #818CF8;'};
  const SLOT_NAMES={morning:'🌅 早上',noon:'☀️ 中午',evening:'🌙 晚上'};
  const dayNames=['日','一','二','三','四','五','六'];
  return dateSlotData.map(d=>{
    const day=new Date(d.date+'T00:00:00');
    const slotsHtml=(d.slots||[]).map(s=>`<span style="${SLOT_COLORS[s]||''}border-radius:6px;padding:2px 8px;font-size:.72rem;font-weight:800;">${SLOT_NAMES[s]||s}</span>`).join(' ');
    return `<div style="display:flex;align-items:center;gap:8px;margin:3px 0;flex-wrap:wrap;">
      <span style="font-size:.8rem;font-weight:800;color:var(--t);min-width:72px;">${d.date.slice(5)}(${dayNames[day.getDay()]})</span>
      ${slotsHtml}
    </div>`;
  }).join('');
}

// ── PET DETAIL DISPLAY ──
function renderPetDataHtml(petData){
  if(!petData||!petData.length) return '<span style="color:var(--tl);">（無寵物資料）</span>';
  return petData.map((p,i)=>{
    const icon=p.type==='cat'?'🐱':'🐶';

        <div style="grid-column:1/-1;"><span style="color:var(--tl);">健康：</span><strong>${health}</strong></div>
      </div>
    </div>`;
  }).join('');
}

// ── PET FILE DOWNLOAD ──
function downloadPetFile(bk){
  const SVC={companion:'到府陪伴',walk:'散步服務',both:'到府＋遛狗'};
  const SLOT={morning:'早上🌅',noon:'中午☀️',evening:'晚上🌙'};
  const dayNames=['日','一','二','三','四','五','六'];
  let txt='';
  txt+='╔══════════════════════════════════════╗\n';
  txt+='║      貓窩裏 🐾 寵物照護明細建檔       ║\n';
  txt+='╚══════════════════════════════════════╝\n\n';
  txt+=`【飼主資訊】\n`;
  txt+=`姓名：${bk.ownerName}\n`;
  txt+=`電話：${bk.ownerPhone}\n`;
  txt+=`地址：${bk.ownerAddr||'—'}\n`;
  txt+=`LINE：${bk.ownerLine||'—'}\n\n`;
  txt+=`【服務資訊】\n`;
  txt+=`服務項目：${(bk.services||[]).map(s=>SVC[s]||s).join('、')}\n`;
  txt+=`加購項目：${bk.addons?.length?bk.addons.join('、'):'無'}\n\n`;
  txt+=`【服務時段明細】\n`;
  if(bk.dateSlotData?.length){
    bk.dateSlotData.forEach(d=>{
      const day=new Date(d.date+'T00:00:00');
      const slots=(d.slots||[]).map(s=>SLOT[s]||s).join('、');
      txt+=`  ${d.date}(${dayNames[day.getDay()]})：${slots}\n`;
    });
  } else {
    txt+=`  ${bk.startDate}～${bk.endDate}（${bk.days}天 × ${bk.tpd}次/天）\n`;
  }
  txt+='\n';
  txt+=`【毛孩資料】\n`;
  const pets=bk.petData||[];
  if(pets.length){
    pets.forEach((p,i)=>{
      const icon=p.type==='cat'?'🐱':'🐶';
      txt+=`\n  ${icon} ${p.name||'寵物'+(i+1)}\n`;
      txt+=`    性別：${p.gender||'—'}　　年齡：${p.age||'—'}\n`;
      txt+=`    疫苗：${p.vaccine||'（未填）'}\n`;
      txt+=`    健康：${(p.health||[]).join('、')||'健康，無疾病'}\n`;
    });
  } else { txt+='  （未填寫寵物資料）\n'; }
  if(bk.petNotes){
    txt+=`\n【注意事項】\n  ${bk.petNotes}\n`;
  }
  txt+=`\n${'─'.repeat(44)}\n`;
  txt+=`訂單編號：${bk.id}\n`;
  txt+=`建檔時間：${new Date().toLocaleString('zh-TW')}\n`;

  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+txt],{type:'text/plain;charset=utf-8'}));
  a.download=`貓窩裏_${bk.ownerName}_寵物明細.txt`;
  a.click();
}


// ── ASSIGNMENT HELPERS (same as admin) ──
function parseAssignments(assignedTo){
  if(!assignedTo) return [];
  if(assignedTo.startsWith('[')){ try{return JSON.parse(assignedTo);}catch(e){} }
  return [];
}
function getMySessions(b, myName){
  const assigns=parseAssignments(b.assignedTo);
  if(assigns.length) return assigns.filter(a=>a.sitter===myName).length;
  // Old format: if assignedTo===myName, use tpd
  return b.assignedTo===myName?(b.tpd||1):0;
}
function getMyTransport(b, myName){
  const assigns=parseAssignments(b.assignedTo);
  if(!assigns.length) return b.assignedTo===myName?(b.transport||0):0;
  const mine=assigns.find(a=>a.sitter===myName);
  return mine?mine.transport||0:0;
}
function getTeamOnOrder(b, myName){
  const assigns=parseAssignments(b.assignedTo);
  if(!assigns.length) return [];
  const others=[...new Set(assigns.filter(a=>a.sitter&&a.sitter!==myName).map(a=>a.sitter))];
  return others;
}
function getMySlots(b, myName){
  const assigns=parseAssignments(b.assignedTo);
  if(!assigns.length) return null; // old format
  return assigns.filter(a=>a.sitter===myName);
}

const SITTER_INIT_PWS={
  Ying:'666',
  小汶:'555',
  菓菓:'333',
  小茹:'000',
  阿瑛:'111'
};

function getChangedPws(){
  // Only stores CHANGED passwords, separate from defaults
  try{
    const raw=localStorage.getItem('sitterPwChanged');
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return {};
}

async function getCorrectPw(name){
  // 1. Try Supabase (cross-device sync)
  try{
    const dbPw=await dbGetSitterPw(name);
    if(dbPw) return dbPw;
  }catch(e){}
  // 2. Hardcoded initial pw ONLY — skip localStorage (may contain stale/corrupted data)
  return SITTER_INIT_PWS[name]||null;
}

function getSitterPws(){
  // Returns all current passwords (for admin display)
  const result={...SITTER_INIT_PWS};
  const changed=getChangedPws();
  Object.keys(changed).forEach(n=>{ if(result[n]!==undefined) result[n]=changed[n]; });
  return result;
}

async function saveSitterPw(name,pw){
  // Save to Supabase (sync across devices)
  try{
    await dbSetSitterPw(name,pw);
  }catch(e){
    alert('密碼儲存失敗，請確認網路連線：'+e.message);return;
  }
  // Also save to localStorage as fallback
  const changed=getChangedPws();
  changed[name]=pw;
  localStorage.setItem('sitterPwChanged',JSON.stringify(changed));
  const log=JSON.parse(localStorage.getItem('sitterPwLog')||'[]');
  log.push({name,newPw:pw,ts:new Date().toISOString()});
  localStorage.setItem('sitterPwLog',JSON.stringify(log));
}

const SITTER_RATE=200; // 保留相容，實際用 calcSitterSalary

// 計算單筆訂單保母薪資
function calcSitterSalary(b){
  const mySess=getMySessions(b,ME?.name||'');
  const sessions=mySess||(b.dateSlotData?.length?b.dateSlotData.reduce((s,d)=>s+(d.slots||[]).length,0):((b.days||0)*(b.tpd||1)));
  // 依服務類型取費率（保母端連假不加成）
  const _rateTable=b.isHoliday?SITTER_HOLIDAY_RATE:SITTER_SVC_RATE;
  const svcRate=(b.services||[]).reduce((sum,k)=>sum+(_rateTable[k]||0),0)||(b.isHoliday?300:200);
  const svcTotal=svcRate*sessions;
  const myTransport=ME?.name?getMyTransport(b,ME.name):(b.transport||0);
  const transport=myTransport;
  return{sessions,svcRate,svcTotal,transport,total:svcTotal+transport};
}

// ── LOGIN ──
async function login(){
  const name=document.getElementById('sitterSel').value;
  const pw=document.getElementById('sitterPw').value;
  if(!name){alert('請先選擇您的名字 🐾');return;}
  if(!pw){alert('請輸入密碼');return;}
  const info=SITTERS[name];
  if(!info){alert('找不到此保母，請確認選擇正確');return;}
  // Show loading
  const btn=document.querySelector('.l-btn');
  if(btn){btn.textContent='⏳ 驗證中...';btn.disabled=true;}
  const correct=await getCorrectPw(name);
  if(btn){btn.textContent='登入保母專區 →';btn.disabled=false;}
  if(!correct||pw!==correct){
    const el=document.getElementById('loginErr');
    el.style.display='block';
    el.textContent='密碼錯誤，請確認後再試';
    document.getElementById('sitterPw').value='';
    return;
  }
  ME={name,info};
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainScreen').style.display='block';
  document.getElementById('topAv').textContent=info.av;
  document.getElementById('topNm').textContent=name;
  document.getElementById('topRole').textContent=info.role;
  renderMain();
}
function logout(){
  ME=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('mainScreen').style.display='none';
  document.getElementById('sitterPw').value='';
  document.getElementById('loginErr').style.display='none';
}

async function renderMain(){
  const allB=await getB();
  const myCases=allB.filter(b=>{
    const assigns=parseAssignments(b.assignedTo);
    if(assigns.length) return assigns.some(a=>a.sitter===ME.name);
    return b.assignedTo===ME.name;
  });
  const done=myCases.filter(b=>b.status==='已完成');
  const reps=(await getReps()).filter(r=>r.sitter===ME.name);
  const sessions=done.reduce((s,b)=>s+(b.dateSlotData?.length?b.dateSlotData.reduce((ss,d)=>ss+(d.slots||[]).length,0):((b.days||0)*(b.tpd||1))),0);
  const sal=done.reduce((s,b)=>s+calcSitterSalary(b).total,0);
  document.getElementById('sStats').innerHTML=`
    <div class="stat"><div class="stat-n">${myCases.length}</div><div class="stat-l">全部案件</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--y3)">${myCases.filter(b=>b.status==='已確認'||b.status==='服務中').length}</div><div class="stat-l">進行中</div></div>
    <div class="stat"><div class="stat-n" style="color:#888">${done.length}</div><div class="stat-l">已完成</div></div>
    <div class="stat"><div class="stat-n">${sessions}</div><div class="stat-l">服務次數</div></div>
    <div class="stat"><div class="stat-n">$${sal.toLocaleString()}</div><div class="stat-l">累計薪資</div></div>
    <div class="stat"><div class="stat-n">${reps.length}</div><div class="stat-l">已回報</div></div>
  `;
  renderCases();
}

async function exportSingleReport(ts){
  const _allRep=await getReps();
  const r=_allRep.find(x=>x.ts===ts);
  if(!r)return;
  const txt=buildReportText(r);
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+txt],{type:'text/plain;charset=utf-8'}));
  a.download=`回報_${r.date}_${r.bookName||'紀錄'}.txt`;
  a.click();
}

async function exportAllReports(){
  const reps=(await getReps()).filter(r=>r.sitter===ME.name).sort((a,b)=>b.ts-a.ts);
  if(!reps.length){alert('尚無回報紀錄');return;}
  const txt=reps.map(r=>buildReportText(r)).join('\n'+'═'.repeat(48)+'\n\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\ufeff'+txt],{type:'text/plain;charset=utf-8'}));
  a.download=`${ME.name}_全部回報_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'')}.txt`;
  a.click();
}

function buildReportText(r){
  const line='─'.repeat(44);
  let t='';
  t+=`【貓窩裏 照護回報明細】\n`;
  t+=`保母：${r.sitter}　日期：${r.date}　時段：${r.timeStart||'—'}${r.timeEnd?' — '+r.timeEnd:''}\n`;
  t+=`案件：${r.bookName}\n`;
  t+=line+'\n';

  if(r.disinfect?.length){
    t+=`\n🧴 進門前準備\n`;
    r.disinfect.forEach(d=>t+=`  ✓ ${d}\n`);
  }

  if(r.petReports?.length){
    r.petReports.forEach(p=>{
      t+=`\n🐾 ${p.name} 個別回報\n`;
      t+=`  精神狀態：${p.spirit||'—'}\n`;
      t+=`  眼睛/鼻子：${p.eyes||'—'}\n`;
      t+=`  糞便狀況：${p.poop||'—'}\n`;
      t+=`  尿液狀況：${p.urine||'—'}\n`;
      t+=`  進食狀況：${p.food||'—'}\n`;
      t+=`  飲水狀況：${p.water||'—'}\n`;
      if(p.emotions?.length) t+=`  今日情緒：${p.emotions.join('、')}\n`;
      if(p.notes) t+=`  互動紀錄：${p.notes}\n`;
    });
  }

  if(r.services?.length){
    t+=`\n🧹 今日服務內容\n`;
    r.services.forEach(s=>t+=`  ✔ ${s}\n`);
  }

  if(r.safety?.length){
    t+=`\n🔐 離開前安全巡檢\n`;
    r.safety.forEach(s=>t+=`  ✔ ${s}\n`);
  }

  if(r.diary){
    t+=`\n💌 保母心情日記\n  ${r.diary}\n`;
  }

  t+=`\n${line}\n匯出時間：${new Date().toLocaleString('zh-TW')}\n`;
  return t;
}

function openReport(bookId,petNameStr){
  currentBookId=bookId;
  videoDataURL=null;videoName='';videoDuration=0;petData={};
  document.getElementById('rModTitle').textContent=`照護回報 — ${petNameStr}`;
  document.getElementById('rDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('rTimeStart').value='';
  document.getElementById('rTimeEnd').value='';
  // reset all checkboxes
  document.querySelectorAll('#reportMod input[type=checkbox]').forEach(c=>c.checked=false);
  document.querySelectorAll('#reportMod .etag').forEach(e=>e.classList.remove('on'));
  document.getElementById('rDiary').value='';
  // build pet tabs
  petNames=petNameStr.trim().split(/[、,，\s]+/).map(s=>s.trim()).filter(Boolean);
  if(!petNames.length)petNames=['寵物'];
  petNames.forEach((_,i)=>{petData[i]={emotions:[]};});
  buildPetTabs(0);
  initPhotoSections();
  document.getElementById('reportMod').classList.add('show');
}

function buildPetTabs(activeIdx){
  activePetIdx=activeIdx;
  document.getElementById('petTabs').innerHTML=petNames.map((nm,i)=>
    `<div class="pt${i===activeIdx?' on':''}" onclick="switchPetTab(${i})">${nm}</div>`).join('');
  renderPetForm(activeIdx);
}
function switchPetTab(idx){
  savePetData(activePetIdx);activePetIdx=idx;
  document.querySelectorAll('.pt').forEach((t,i)=>t.classList.toggle('on',i===idx));
  renderPetForm(idx);
}

// Compress image to max 800px, JPEG quality 0.72
function compressImage(file,cb){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const MAX=800;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      cb(canvas.toDataURL('image/jpeg',0.72));
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function loadPetPhoto(input,idx){
  const file=input.files[0];if(!file)return;
  compressImage(file,url=>{
    const existing=reportPhotos.findIndex(p=>p.slot===idx&&p.type==='pet');
    if(existing>=0)reportPhotos[existing].dataUrl=url;
    else reportPhotos.push({slot:idx,dataUrl:url,type:'pet'});
    const inner=document.getElementById('pslot-inner-'+idx);
    if(inner)inner.innerHTML=`<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">`;
  });
}

function loadCleanPhoto(input,groupIdx,side){
  const file=input.files[0];if(!file)return;
  compressImage(file,url=>{
    const key=side==='before'?`cgb-${groupIdx}`:`cga-${groupIdx}`;
    const el=document.getElementById(key);

    else reportCleanPhotos.push({groupIdx,side,dataUrl:url,label:cleanGroupLabels[groupIdx]||'清潔'});

}

async function submitReport(){
  savePetData(activePetIdx);
  const services=Array.from(document.querySelectorAll('#svcChecks input:checked')).map(c=>c.value);
  const disinfect=Array.from(document.querySelectorAll('#disinfectChecks input:checked')).map(c=>c.value);
  const safety=Array.from(document.querySelectorAll('#safetyChecks input:checked')).map(c=>c.value);
  const _allBk=await getB();
  const bk=_allBk.find(b=>b.id===currentBookId||b.id===parseInt(currentBookId));
  const r={
    ts:Date.now(),bookId:Number(currentBookId),
    bookName:(()=>{
      if(bk?.petData?.length) return bk.petData.map(p=>p.name||'寵物').join('、');
      return bk?.petName||petNames.join('、')||'寵物';
    })(),
    sitter:ME.name,
    date:document.getElementById('rDate').value,
    timeStart:document.getElementById('rTimeStart').value,
    timeEnd:document.getElementById('rTimeEnd').value,
    petReports:petNames.map((nm,i)=>({name:nm,...petData[i]})),
    services,disinfect,safety,
    diary:document.getElementById('rDiary').value,
    petPhotos:reportPhotos.map(p=>({slot:p.slot,dataUrl:p.dataUrl})),
    cleanPhotos:reportCleanPhotos.map(p=>({groupIdx:p.groupIdx,side:p.side,dataUrl:p.dataUrl,label:p.label||''})),
    videoDataUrl:reportVideoDataUrl||'',
  };
  try{
    await dbInsertReport(r);
  }catch(e){
    alert('回報儲存失敗 😿\n錯誤：' + (e?.message||String(e)));
    console.error('submitReport failed:', e?.message||e);
    return;
  }
  closeM('reportMod');
  renderMain();
  alert('✅ 回報已送出！飼主可立即在毛孩爸媽系統查看。');
}

async function previewReport(ts){
  const _allReps=await getReps();
  const r=_allReps.find(x=>x.ts===ts);if(!r)return;
  let html='';
  const block=(title,content)=>`<div class="prev-section"><div class="prev-title">${title}</div><div class="prev-content">${content}</div></div>`;
  const tag=t=>`<span class="prev-tag">✓ ${t}</span>`;

  html+=block('📅 基本資訊',`${r.date} ${r.timeStart||''}${r.timeEnd?' — '+r.timeEnd:''} ｜ 保母：${r.sitter}`);
  if(r.disinfect?.length)html+=block('🧴 進門前準備',r.disinfect.map(tag).join(''));
  r.petReports?.forEach(p=>{
    html+=`<div class="prev-section"><div class="prev-title">🐾 ${p.name}</div>
      <div class="prev-content">
        精神：${p.spirit} ｜ 眼鼻：${p.eyes}<br>
        糞便：${p.poop} ｜ 尿液：${p.urine}<br>
        進食：${p.food} ｜ 飲水：${p.water}
        ${p.emotions?.length?`<br>💞 情緒：${p.emotions.join('・')}`:''}
        ${p.notes?`<br>✨ ${p.notes}`:''}
      </div></div>`;
  });
  if(r.services?.length)html+=block('🧹 服務內容',r.services.map(tag).join(''));
  const petPhotos=r.photos?.filter(p=>p.key.startsWith('pet'));
  if(petPhotos?.length){
    html+=`<div class="prev-section"><div class="prev-title">🌟 毛孩美照（${petPhotos.length}張）</div>
      <div class="prev-grid">${petPhotos.map(p=>`<img class="prev-photo" src="${p.url}">`).join('')}</div></div>`;
  }
  if(r.hasVideo)html+=block('🎬 影片',`${r.videoName}（${r.videoDuration}秒）`);
  if(r.safety?.length)html+=block('🔐 環境安全巡檢',r.safety.map(tag).join(''));
  if(r.diary)html+=block('💌 保母心情日記',`<em style="line-height:1.8;">${r.diary}</em>`);

  document.getElementById('prevContent').innerHTML=html;
  document.getElementById('previewMod').classList.add('show');
}
