<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓窩裏｜後台管理</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0F0F13;
  --bg2:#16161C;
  --bg3:#1E1E28;
  --card:#1A1A24;
  --card2:#22222E;
  --border:#2A2A3A;
  --border2:#333348;
  --p1:#FF8FA3;--p2:#FFB6C1;--p3:#FF5C7D;
  --g:#2DD4BF;--g2:#14B8A6;
  --y:#FBBF24;--y2:#FDE68A;
  --b:#818CF8;--b2:#6366F1;
  --o:#FB923C;
  --r:#F87171;
  --pu:#C084FC;
  --t:#F0F0FA;--tl:#8888AA;--tm:#BBBBCC;
  --sh:0 4px 24px rgba(0,0,0,.45);
  --sh2:0 8px 40px rgba(0,0,0,.6);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{height:100%;}
body{
  font-family:'Noto Sans TC',sans-serif;
  background:var(--bg);color:var(--t);
  min-height:100vh;
  background-image:
    radial-gradient(ellipse at 20% 20%,rgba(99,102,241,.06) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,rgba(255,143,163,.05) 0%,transparent 50%);
}

/* ═══ LOGIN ═══ */
#loginScreen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
}
.login-wrap{
  background:var(--card);border:1px solid var(--border2);
  border-radius:24px;padding:48px 40px;text-align:center;
  width:400px;max-width:96vw;
  box-shadow:var(--sh2),0 0 0 1px rgba(255,143,163,.08);
  position:relative;overflow:hidden;
}
.login-wrap::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--p3),var(--p1),var(--b),var(--g));
}
.login-ico{font-size:3.2rem;margin-bottom:14px;filter:drop-shadow(0 4px 12px rgba(255,143,163,.4));}
.login-title{font-family:'Nunito',sans-serif;font-size:1.6rem;font-weight:900;color:var(--t);margin-bottom:4px;}
.login-sub{font-size:.82rem;color:var(--tl);margin-bottom:30px;}
.login-in{
  width:100%;padding:14px 18px;
  background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:12px;color:var(--t);font-size:.95rem;
  font-family:inherit;outline:none;text-align:center;
  letter-spacing:8px;transition:border .2s,box-shadow .2s;margin-bottom:14px;
}
.login-in:focus{border-color:var(--p1);box-shadow:0 0 0 3px rgba(255,143,163,.12);}
.login-btn{
  width:100%;padding:14px;
  background:linear-gradient(135deg,var(--p3),var(--p1));
  color:#fff;border:none;border-radius:12px;
  font-size:1rem;font-weight:800;font-family:'Nunito',sans-serif;
  cursor:pointer;transition:all .2s;
  box-shadow:0 6px 20px rgba(255,92,125,.3);
}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(255,92,125,.42);}
.login-err{color:var(--r);font-size:.8rem;margin-top:10px;display:none;}

/* ═══ LAYOUT ═══ */
#adminScreen{display:none;min-height:100vh;display:none;flex-direction:column;}
#adminScreen.show{display:flex;}

/* ── SIDEBAR ── */
.sidebar{
  position:fixed;top:0;left:0;bottom:0;width:230px;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;z-index:50;
  transition:transform .3s;
}
.sidebar-logo{
  padding:24px 20px 20px;border-bottom:1px solid var(--border);
}
.sidebar-brand{
  font-family:'Nunito',sans-serif;font-size:1.15rem;font-weight:900;
  color:var(--p1);display:flex;align-items:center;gap:10px;
}
.sidebar-brand-sub{font-size:.72rem;color:var(--tl);margin-top:2px;font-weight:400;}
.sidebar-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:4px;}
.nav-item{
  display:flex;align-items:center;gap:12px;padding:11px 14px;
  border-radius:12px;cursor:pointer;font-size:.85rem;font-weight:600;
  color:var(--tl);transition:all .2s;text-decoration:none;
  font-family:'Nunito',sans-serif;
}
.nav-item:hover{background:var(--bg3);color:var(--t);}
.nav-item.on{background:linear-gradient(135deg,rgba(255,143,163,.15),rgba(255,143,163,.08));color:var(--p1);border:1px solid rgba(255,143,163,.2);}
.nav-ico{font-size:1.1rem;width:22px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--p3);color:#fff;font-size:.68rem;padding:2px 8px;border-radius:10px;font-weight:800;}
.sidebar-bottom{padding:16px 12px;border-top:1px solid var(--border);}
.sidebar-user{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;background:var(--bg3);}
.su-av{font-size:1.4rem;}
.su-name{font-size:.8rem;font-weight:700;color:var(--t);}
.su-role{font-size:.68rem;color:var(--tl);}

/* ── MAIN ── */
.main{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{
  background:rgba(22,22,28,.8);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:40;
}
.topbar-title{font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:800;color:var(--t);}
.topbar-right{display:flex;gap:10px;align-items:center;}
.tb-btn{
  padding:8px 16px;border-radius:10px;border:none;cursor:pointer;
  font-size:.8rem;font-weight:700;font-family:'Nunito',sans-serif;transition:all .2s;
}
.tb-pink{background:linear-gradient(135deg,var(--p3),var(--p1));color:#fff;}
.tb-ghost{background:var(--bg3);border:1px solid var(--border2);color:var(--tl);}
.tb-ghost:hover{border-color:var(--p1);color:var(--p1);}
.tb-teal{background:var(--g);color:#000;}

/* ── CONTENT ── */
.content{padding:28px;flex:1;}

/* ── STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:16px;padding:22px 20px;position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s;
}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--sh);}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
}
.stat-card.c1::before{background:linear-gradient(90deg,var(--p3),var(--p1));}
.stat-card.c2::before{background:linear-gradient(90deg,var(--y),#F59E0B);}
.stat-card.c3::before{background:linear-gradient(90deg,var(--g2),var(--g));}
.stat-card.c4::before{background:linear-gradient(90deg,var(--b2),var(--b));}
.stat-card.c5::before{background:linear-gradient(90deg,var(--pu),#A855F7);}
.stat-ico{font-size:1.8rem;margin-bottom:10px;}
.stat-n{font-family:'Nunito',sans-serif;font-size:2rem;font-weight:900;color:var(--t);}
.stat-l{font-size:.76rem;color:var(--tl);margin-top:4px;font-weight:600;}
.stat-trend{font-size:.72rem;color:var(--g);margin-top:6px;font-weight:700;}

/* ── PANEL ── */
.panel{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;margin-bottom:24px;}
.panel-header{
  padding:18px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;
}
.panel-title{font-family:'Nunito',sans-serif;font-size:.95rem;font-weight:800;color:var(--t);display:flex;align-items:center;gap:8px;}
.panel-body{padding:22px;}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;padding:16px 22px;border-bottom:1px solid var(--border);background:var(--bg2);}
.fi{
  padding:8px 14px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;color:var(--tm);font-family:'Noto Sans TC',sans-serif;
  font-size:.8rem;outline:none;transition:border .2s;
}
.fi:focus{border-color:var(--p1);}
.fi-search{min-width:200px;}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:.79rem;}
th{
  background:var(--bg2);color:var(--tl);
  padding:12px 14px;text-align:left;
  border-bottom:1px solid var(--border);
  white-space:nowrap;font-weight:700;font-family:'Nunito',sans-serif;font-size:.76rem;
  letter-spacing:.5px;text-transform:uppercase;
}
td{padding:13px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:rgba(255,143,163,.03);}
tr:last-child td{border:none;}
.td-name{font-weight:700;color:var(--t);}
.td-sub{font-size:.72rem;color:var(--tl);margin-top:2px;}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:.7rem;font-weight:800;font-family:'Nunito',sans-serif;}
.bw{background:rgba(251,191,36,.12);color:var(--y);border:1px solid rgba(251,191,36,.3);}
.bg{background:rgba(45,212,191,.12);color:var(--g);border:1px solid rgba(45,212,191,.3);}
.bb{background:rgba(129,140,248,.12);color:var(--b);border:1px solid rgba(129,140,248,.3);}
.bd{background:rgba(180,180,200,.08);color:#666;border:1px solid rgba(180,180,200,.2);}
.br{background:rgba(248,113,113,.12);color:var(--r);border:1px solid rgba(248,113,113,.3);}
.bp{background:rgba(255,143,163,.12);color:var(--p1);border:1px solid rgba(255,143,163,.3);}

/* ── ACTION BTNS ── */
.act-btns{display:flex;gap:5px;flex-wrap:wrap;}
.abtn{padding:5px 10px;border-radius:8px;border:none;cursor:pointer;font-size:.71rem;font-weight:700;font-family:'Nunito',sans-serif;transition:all .15s;}
.ab-g{background:rgba(45,212,191,.12);color:var(--g);border:1px solid rgba(45,212,191,.25);}
.ab-g:hover{background:rgba(45,212,191,.25);}
.ab-o{background:rgba(251,146,60,.12);color:var(--o);border:1px solid rgba(251,146,60,.25);}
.ab-o:hover{background:rgba(251,146,60,.25);}
.ab-b{background:rgba(129,140,248,.12);color:var(--b);border:1px solid rgba(129,140,248,.25);}
.ab-b:hover{background:rgba(129,140,248,.25);}
.ab-r{background:rgba(248,113,113,.12);color:var(--r);border:1px solid rgba(248,113,113,.25);}
.ab-r:hover{background:rgba(248,113,113,.25);}
.ab-pu{background:rgba(192,132,252,.12);color:var(--pu);border:1px solid rgba(192,132,252,.25);}
.ab-pu:hover{background:rgba(192,132,252,.25);}

/* ── SITTER GRID ── */
.sitter-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;}
.sitter-card{
  background:var(--card2);border:1px solid var(--border);border-radius:16px;
  padding:22px;transition:border .2s,box-shadow .2s;
}
.sitter-card:hover{border-color:var(--border2);box-shadow:var(--sh);}
.sc-head{display:flex;align-items:center;gap:13px;margin-bottom:16px;}
.sc-av{font-size:2.2rem;}
.sc-name{font-family:'Nunito',sans-serif;font-weight:900;color:var(--t);font-size:1rem;}
.sc-role{font-size:.7rem;color:var(--tl);margin-top:2px;}
.sc-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:.8rem;}
.sc-row:last-of-type{border:none;}
.sc-label{color:var(--tl);}
.sc-val{font-weight:800;color:var(--g);font-family:'Nunito',sans-serif;}
.sc-exp-btn{
  width:100%;margin-top:14px;padding:10px;background:transparent;
  border:1px solid var(--border2);color:var(--tl);border-radius:10px;
  font-size:.78rem;cursor:pointer;font-family:'Nunito',sans-serif;
  font-weight:700;transition:all .2s;
}
.sc-exp-btn:hover{border-color:var(--p1);color:var(--p1);}

/* ── MONTH PICKER ── */
.month-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:18px;}
.month-row label{font-size:.8rem;color:var(--tl);font-weight:700;}
.month-pick{
  padding:9px 14px;background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;color:var(--t);font-family:inherit;outline:none;width:170px;
}
.month-pick:focus{border-color:var(--p1);}

/* ── COUPONS ── */
.coupon-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;}
.coupon-row{
  background:var(--card2);border:1px solid var(--border);border-radius:14px;
  padding:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;
  transition:border .2s;
}
.coupon-row.used{opacity:.4;}
.coupon-row:hover{border-color:var(--border2);}
.cr-code{font-family:monospace;font-size:.78rem;color:var(--y);font-weight:700;margin-bottom:4px;}
.cr-pet{font-size:.8rem;font-weight:700;color:var(--t);}
.cr-date{font-size:.7rem;color:var(--tl);}
.cr-status{padding:4px 10px;border-radius:10px;font-size:.68rem;font-weight:800;font-family:'Nunito',sans-serif;}
.crs-ok{background:rgba(45,212,191,.12);color:var(--g);border:1px solid rgba(45,212,191,.3);}
.crs-used{background:rgba(180,180,200,.08);color:#555;border:1px solid rgba(180,180,200,.15);}

/* ── REVIEW LIST ── */
.review-list{display:flex;flex-direction:column;gap:12px;}
.review-row{
  background:var(--card2);border:1px solid var(--border);border-radius:14px;
  padding:16px 18px;
}
.rr-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.rr-pet{font-weight:800;color:var(--t);font-size:.9rem;}
.rr-sitter{font-size:.74rem;color:var(--tl);}
.rr-comment{font-size:.82rem;color:var(--tm);line-height:1.6;}
.rr-stars{color:var(--y);}

/* ── MODALS ── */
.m-ov{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);
  z-index:999;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
.m-ov.show{display:flex;}
.m-box{
  background:var(--card);border:1px solid var(--border2);
  border-radius:20px;padding:28px;max-width:96vw;
  max-height:88vh;overflow-y:auto;
  box-shadow:var(--sh2);
}
.m-box h3{font-family:'Nunito',sans-serif;font-weight:900;color:var(--p1);margin-bottom:18px;font-size:1.1rem;}
.m-box select,.m-box input{
  width:100%;padding:11px 14px;margin-bottom:12px;
  background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:10px;color:var(--t);font-family:inherit;font-size:.88rem;outline:none;
  transition:border .2s;
}
.m-box select:focus,.m-box input:focus{border-color:var(--p1);}
.m-row{display:flex;gap:10px;}
.m-row .tb-btn{flex:1;padding:11px;border-radius:10px;font-size:.88rem;}
.det-row{
  display:flex;justify-content:space-between;align-items:flex-start;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:.83rem;
}
.det-row:last-child{border:none;}
.det-l{color:var(--tl);flex-shrink:0;}
.det-v{font-weight:700;text-align:right;color:var(--t);}
.det-total{color:var(--g);font-size:1.05rem;font-weight:900;font-family:'Nunito',sans-serif;}
.exp-txt{
  font-size:.78rem;line-height:1.9;color:var(--tl);
  background:var(--bg2);border-radius:10px;padding:16px;
  max-height:360px;overflow-y:auto;white-space:pre-wrap;
  font-family:'Courier New',monospace;border:1px solid var(--border);
  margin-bottom:14px;
}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .hamburger{display:flex!important;}
}
.hamburger{display:none;align-items:center;justify-content:center;width:36px;height:36px;
  background:var(--bg3);border:1px solid var(--border2);border-radius:8px;cursor:pointer;font-size:1.1rem;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-wrap">
    <div class="login-ico">🔐</div>
    <div class="login-title">後台管理系統</div>
    <div class="login-sub">貓窩裏 到府寵物褓姆</div>
    <input class="login-in" type="password" id="pwIn" placeholder="• • • • • • • •" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">登入後台 →</button>
    <div class="login-err" id="loginErr">❌ 密碼錯誤，請再試一次</div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminScreen">
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-brand">
        <span>🐾</span>
        <div>
          <div>貓窩裏</div>
          <div class="sidebar-brand-sub">後台管理系統</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item on" onclick="switchPage('orders',this)" data-page="orders">
        <span class="nav-ico">📋</span> 訂單管理
        <span class="nav-badge" id="pendingBadge">0</span>
      </div>
      <div class="nav-item" onclick="switchPage('salary',this)" data-page="salary">
        <span class="nav-ico">💰</span> 薪資計算
      </div>
      <div class="nav-item" onclick="switchPage('coupons',this)" data-page="coupons">
        <span class="nav-ico">🎟</span> 折抵券管理
      </div>
      <div class="nav-item" onclick="switchPage('reviews',this)" data-page="reviews">
        <span class="nav-ico">⭐</span> 好評管理
      </div>
      <div class="nav-item" style="margin-top:auto;" onclick="window.open('index.html')">
        <span class="nav-ico">🌐</span> 前台預覽
      </div>
      <div class="nav-item" onclick="window.open('sitter.html')">
        <span class="nav-ico">👩</span> 保母端
      </div>
    </nav>
    <div class="sidebar-bottom">
      <div class="sidebar-user">
        <div class="su-av">👑</div>
        <div>
          <div class="su-name">管理員</div>
          <div class="su-role">貓窩裏老闆</div>
        </div>
      </div>
      <div class="nav-item" style="margin-top:8px;color:var(--r);" onclick="logout()">
        <span class="nav-ico">🚪</span> 登出
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <!-- TOPBAR -->
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</div>
        <div class="topbar-title" id="pageTitle">📋 訂單管理</div>
      </div>
      <div class="topbar-right">
        <button class="tb-btn tb-teal" onclick="exportAll()">📥 匯出全部</button>
        <button class="tb-btn tb-pink" onclick="refreshAll()">🔄 重整</button>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <!-- STATS (always visible) -->
      <div class="stats-grid" id="statsGrid"></div>

      <!-- ORDERS PAGE -->
      <div id="page-orders">
        <div class="panel">
          <div class="filter-bar">
            <input class="fi fi-search" type="text" id="searchQ" placeholder="🔍 搜尋飼主 / 寵物 / 電話..." oninput="renderOrders()">
            <select class="fi" id="statusF" onchange="renderOrders()">
              <option value="">全部狀態</option>
              <option>待確認</option><option>已確認</option><option>服務中</option><option>已完成</option><option>已取消</option>
            </select>
            <select class="fi" id="sitterF" onchange="renderOrders()">
              <option value="">全部保母</option>
              <option>Ying</option><option>小汶</option><option>菓菓</option><option>小茹</option><option>阿瑛</option>
            </select>
          </div>
          <div class="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th><th>預約時間</th><th>飼主</th><th>寵物</th>
                  <th>日期</th><th>天/次</th><th>服務</th><th>費用</th>
                  <th>保母</th><th>狀態</th><th>操作</th>
                </tr>
              </thead>
              <tbody id="orderTbody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- SALARY PAGE -->
      <div id="page-salary" style="display:none;">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">💰 保母薪資計算</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
              <div class="month-row" style="margin:0;">
                <label>月份：</label>
                <input type="month" class="month-pick" id="salMonth" onchange="renderSalary()">
              </div>
              <button class="tb-btn tb-pink" onclick="exportAllSalary()">📤 全體薪資報表</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="sitter-grid" id="sitterGrid"></div>
          </div>
        </div>
      </div>

      <!-- COUPONS PAGE -->
      <div id="page-coupons" style="display:none;">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">🎟 折抵券管理</div>
            <div style="display:flex;gap:8px;">
              <select class="fi" id="couponFilter" onchange="renderCoupons()">
                <option value="">全部</option>
                <option value="valid">未使用</option>
                <option value="used">已使用</option>
              </select>
            </div>
          </div>
          <div class="panel-body">
            <div class="coupon-grid" id="couponGrid"></div>
          </div>
        </div>
      </div>

      <!-- REVIEWS PAGE -->
      <div id="page-reviews" style="display:none;">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">⭐ 客戶好評管理</div>
          </div>
          <div class="panel-body">
            <div class="review-list" id="reviewListAdmin"></div>
          </div>
        </div>
      </div>

    </div><!-- /content -->
  </div><!-- /main -->
</div><!-- /adminScreen -->

<!-- ASSIGN MODAL -->
<div class="m-ov" id="assignMod">
  <div class="m-box" style="width:360px;">
    <h3>👩 指派保母</h3>
    <input type="hidden" id="assignId">
    <select id="assignSel">
      <option value="">-- 選擇保母 --</option>
      <option>Ying</option><option>小汶</option><option>菓菓</option><option>小茹</option><option>阿瑛</option>
    </select>
    <div class="m-row">
      <button class="tb-btn tb-pink" onclick="doAssign()" style="flex:1;padding:12px;border-radius:10px;">確認指派</button>
      <button class="tb-btn tb-ghost" onclick="closeM('assignMod')" style="flex:1;padding:12px;border-radius:10px;">取消</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="m-ov" id="detailMod">
  <div class="m-box" style="width:560px;">
    <h3>📋 訂單明細</h3>
    <div id="detailContent"></div>
    <button class="tb-btn tb-pink" style="width:100%;margin-top:18px;padding:12px;border-radius:10px;" onclick="closeM('detailMod')">關閉</button>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="m-ov" id="exportMod">
  <div class="m-box" style="width:560px;">
    <h3 id="exportTitle">薪資明細</h3>
    <div class="exp-txt" id="exportTxt"></div>
    <div class="m-row">
      <button class="tb-btn tb-pink" onclick="copyExp()" style="flex:1;padding:11px;border-radius:10px;">📋 複製</button>
      <button class="tb-btn tb-teal" onclick="dlExp()" style="flex:1;padding:11px;border-radius:10px;">💾 下載</button>
      <button class="tb-btn tb-ghost" onclick="closeM('exportMod')" style="flex:1;padding:11px;border-radius:10px;">關閉</button>
    </div>
  </div>
</div>

<script>
const PW='chch715715';
const SITTERS_LIST=['Ying','小汶','菓菓','小茹','阿瑛'];
const ROLES={Ying:'資深貓咪照護',小汶:'老年寵物照護',菓菓:'中途志工',小茹:'中途志工',阿瑛:'中途志工'};
const AVA={Ying:'🐱',小汶:'🌟',菓菓:'🍎',小茹:'🐕',阿瑛:'🌺'};
const SVC={companion:'到府陪伴',walk:'散步',both:'陪伴＋散步'};
const SVCPRICE={companion:300,walk:200,both:500};
const ADDON={餵藥:50,點藥:50,舒緩按摩:100,剪指甲:80,協助排便導尿:80,收信:30,澆花:30,倒垃圾:50};

function login(){
  if(document.getElementById('pwIn').value===PW){
    document.getElementById('loginScreen').style.display='none';
    const as=document.getElementById('adminScreen');
    as.style.display='flex';as.classList.add('show');
    const now=new Date();
    document.getElementById('salMonth').value=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    refreshAll();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('pwIn').value='';
  }
}
function logout(){
  document.getElementById('loginScreen').style.display='flex';
  const as=document.getElementById('adminScreen');
  as.style.display='none';as.classList.remove('show');
  document.getElementById('pwIn').value='';
  document.getElementById('loginErr').style.display='none';
}

// DATA
function getB(){return JSON.parse(localStorage.getItem('bookings')||'[]');}
function saveB(b){localStorage.setItem('bookings',JSON.stringify(b));}
function getCoupons(){return JSON.parse(localStorage.getItem('coupons')||'[]');}
function getReviews(){return JSON.parse(localStorage.getItem('fbReviews')||'[]');}

function calcB(b){
  const base=(b.services||[]).reduce((s,k)=>s+(SVCPRICE[k]||0),0);
  const addon=(b.addons||[]).reduce((s,a)=>s+(ADDON[a]||0),0);
  let extra=0;
  if((b.catCount||1)>2)extra+=(b.catCount-2)*30;
  if((b.dogCount||0)>2)extra+=(b.dogCount-2)*30;
  const per=base+addon+extra;
  const sub=per*(b.tpd||1)*(b.days||0);
  return{base,addon,extra,per,sub,transport:b.transport||0,urgent:b.urgent||0,total:sub+(b.transport||0)+(b.urgent||0)};
}

function refreshAll(){renderStats();renderOrders();renderSalary();renderCoupons();renderReviewsAdmin();}

// STATS
function renderStats(){
  const b=getB();
  const pending=b.filter(x=>x.status==='待確認').length;
  const active=b.filter(x=>x.status==='已確認'||x.status==='服務中').length;
  const done=b.filter(x=>x.status==='已完成').length;
  const rev=b.filter(x=>x.status==='已完成').reduce((s,x)=>s+calcB(x).total,0);
  const coupons=getCoupons();
  document.getElementById('pendingBadge').textContent=pending||'';
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card c1"><div class="stat-ico">📋</div><div class="stat-n">${b.length}</div><div class="stat-l">總預約數</div></div>
    <div class="stat-card c2"><div class="stat-ico">⏳</div><div class="stat-n">${pending}</div><div class="stat-l">待確認</div></div>
    <div class="stat-card c3"><div class="stat-ico">✅</div><div class="stat-n">${active}</div><div class="stat-l">進行中</div></div>
    <div class="stat-card c4"><div class="stat-ico">💰</div><div class="stat-n">$${rev.toLocaleString()}</div><div class="stat-l">完成總營收</div></div>
    <div class="stat-card c5"><div class="stat-ico">🎟</div><div class="stat-n">${coupons.filter(c=>!c.used).length}</div><div class="stat-l">有效折抵券</div></div>
  `;
}

// ORDERS
function renderOrders(){
  let b=getB();
  const q=document.getElementById('searchQ').value.toLowerCase();
  const sf=document.getElementById('statusF').value;
  const sif=document.getElementById('sitterF').value;
  if(q)b=b.filter(x=>[x.ownerName,x.ownerPhone,x.petName].join(' ').toLowerCase().includes(q));
  if(sf)b=b.filter(x=>x.status===sf);
  if(sif)b=b.filter(x=>x.assignedTo===sif);
  b.sort((a,z)=>z.id-a.id);

  const tbody=document.getElementById('orderTbody');
  if(!b.length){tbody.innerHTML=`<tr><td colspan="11" style="text-align:center;padding:40px;color:var(--tl);">尚無預約資料 🐾</td></tr>`;return;}
  const sCls={待確認:'bw',已確認:'bg',服務中:'bb',已完成:'bd',已取消:'br'};
  const sLbl={companion:'陪伴',walk:'散步',both:'陪+散'};
  const dt=ts=>new Date(ts).toLocaleString('zh-TW',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  tbody.innerHTML=b.map((bk,i)=>{
    const{total}=calcB(bk);
    const svcs=(bk.services||[]).map(s=>sLbl[s]||s).join('＋');
    return `<tr>
      <td style="color:var(--tl);font-size:.72rem;">${i+1}</td>
      <td style="white-space:nowrap;font-size:.72rem;color:var(--tl);">${dt(bk.ts)}</td>
      <td><div class="td-name">${bk.ownerName}</div><div class="td-sub">${bk.ownerPhone}</div></td>
      <td><div class="td-name">${bk.petName}</div><div class="td-sub">${bk.petBreed||''}</div></td>
      <td style="font-size:.75rem;white-space:nowrap;">${bk.startDate}<br><span style="color:var(--tl);">→ ${bk.endDate}</span></td>
      <td style="font-size:.8rem;">${bk.days}天<br><span style="color:var(--tl);">${bk.tpd}次/天</span></td>
      <td><span class="badge bp">${svcs}</span></td>
      <td><span style="font-weight:800;color:var(--g);font-family:'Nunito',sans-serif;">$${total}</span></td>
      <td style="font-size:.8rem;">${bk.assignedTo||`<span style="color:var(--tl);">未指派</span>`}</td>
      <td><span class="badge ${sCls[bk.status]||'bd'}">${bk.status}</span></td>
      <td>
        <div class="act-btns">
          <button class="abtn ab-b" onclick="viewDetail(${bk.id})">明細</button>
          ${bk.status==='待確認'?`<button class="abtn ab-g" onclick="confirmO(${bk.id})">確認</button>`:''}
          <button class="abtn ab-o" onclick="openAssign(${bk.id})">指派</button>
          ${bk.status!=='已完成'&&bk.status!=='已取消'?`<button class="abtn ab-pu" onclick="doneO(${bk.id})">完成</button>`:''}
          <button class="abtn ab-r" onclick="delO(${bk.id})">刪除</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function confirmO(id){upB(id,b=>{b.status='已確認';});}
function doneO(id){upB(id,b=>{b.status='已完成';});}
function delO(id){if(!confirm('確定刪除？'))return;saveB(getB().filter(x=>x.id!==id));refreshAll();}
function upB(id,fn){const b=getB();const i=b.findIndex(x=>x.id===id);if(i>=0){fn(b[i]);saveB(b);refreshAll();}}

function openAssign(id){document.getElementById('assignId').value=id;document.getElementById('assignMod').classList.add('show');}
function doAssign(){
  const id=parseInt(document.getElementById('assignId').value);
  const s=document.getElementById('assignSel').value;
  if(!s){alert('請選擇保母');return;}
  upB(id,b=>{b.assignedTo=s;});closeM('assignMod');
}

function viewDetail(id){
  const bk=getB().find(x=>x.id===id);if(!bk)return;
  const{base,addon,extra,per,sub,transport,urgent,total}=calcB(bk);
  const svcs=(bk.services||[]).map(s=>SVC[s]||s).join('＋');
  const det=(l,v)=>`<div class="det-row"><span class="det-l">${l}</span><span class="det-v">${v}</span></div>`;
  document.getElementById('detailContent').innerHTML=`
    ${det('飼主',`${bk.ownerName} / ${bk.ownerPhone}`)}
    ${det('LINE',bk.ownerLine||'—')}
    ${det('地址',bk.ownerAddr)}
    ${det('寵物',`${bk.petName}${bk.petBreed?' ('+bk.petBreed+')':''}`)}
    ${det('日期',`${bk.startDate} ～ ${bk.endDate}（${bk.days}天 × ${bk.tpd}次/天）`)}
    ${det('主要服務',svcs)}
    ${det('加購',(bk.addons||[]).join('、')||'無')}
    ${det('毛孩數量',`貓 ${bk.catCount||1} / 狗 ${bk.dogCount||0}`)}
    ${bk.petInfo?det('健康注意',bk.petInfo):''}
    ${bk.urgent>0?det('急件加收','$'+bk.urgent):''}
    ${det('距離',`${bk.distance||0} km`)}
    ${bk.notes?det('備注',bk.notes):''}
    ${bk.couponUsed?det('折抵券',bk.couponUsed):''}
    <div style="margin-top:14px;background:rgba(255,143,163,.05);border-radius:10px;padding:14px;border:1px solid rgba(255,143,163,.1);">
      ${det('主要服務/次','$'+base)}
      ${det('加購/次','$'+addon)}
      ${det('多寵/次','$'+extra)}
      ${det('每次費用','$'+per)}
      ${det(`× ${bk.tpd}次 × ${bk.days}天`,'$'+sub)}
      ${urgent>0?det('急件','$'+urgent):''}
      ${transport>0?det('車馬費','$'+transport):''}
      <div class="det-row" style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">
        <span class="det-l det-total">總費用</span><span class="det-v det-total">$${total}</span>
      </div>
    </div>
    ${det('負責保母',bk.assignedTo||'未指派')}
    ${det('狀態',bk.status)}
  `;
  document.getElementById('detailMod').classList.add('show');
}

// SALARY
function renderSalary(){
  const month=document.getElementById('salMonth').value;
  const b=getB();
  document.getElementById('sitterGrid').innerHTML=SITTERS_LIST.map(s=>{
    const cases=b.filter(x=>x.assignedTo===s&&(!month||x.startDate.startsWith(month)));
    const done=cases.filter(x=>x.status==='已完成');
    const rev=done.reduce((sum,x)=>sum+calcB(x).total,0);
    const days=done.reduce((sum,x)=>sum+(x.days||0),0);
    const sess=done.reduce((sum,x)=>sum+(x.days||0)*(x.tpd||1),0);
    return `<div class="sitter-card">
      <div class="sc-head">
        <div class="sc-av">${AVA[s]||'🐾'}</div>
        <div><div class="sc-name">${s}</div><div class="sc-role">${ROLES[s]||''}</div></div>
      </div>
      <div class="sc-row"><span class="sc-label">全部案件</span><span class="sc-val">${cases.length} 件</span></div>
      <div class="sc-row"><span class="sc-label">已完成</span><span class="sc-val">${done.length} 件</span></div>
      <div class="sc-row"><span class="sc-label">服務天數</span><span class="sc-val">${days} 天</span></div>
      <div class="sc-row"><span class="sc-label">服務次數</span><span class="sc-val">${sess} 次</span></div>
      <div class="sc-row"><span class="sc-label">本期薪資</span><span class="sc-val" style="font-size:1.05rem;">$${rev.toLocaleString()}</span></div>
      <button class="sc-exp-btn" onclick="exportSitter('${s}')">📄 匯出薪資明細</button>
    </div>`;
  }).join('');
}

function exportSitter(name){
  const month=document.getElementById('salMonth').value;
  const cases=getB().filter(x=>x.assignedTo===name&&x.status==='已完成'&&(!month||x.startDate.startsWith(month)));
  const m=month||'全部月份';
  let txt=`【貓窩裏寵物褓姆】薪資明細\n保母：${name}（${ROLES[name]}）\n月份：${m}\n匯出：${new Date().toLocaleString('zh-TW')}\n${'─'.repeat(44)}\n\n`;
  let grand=0;
  if(!cases.length){txt+='本期間無已完成訂單\n';}
  cases.forEach((bk,i)=>{
    const{base,addon,extra,per,sub,transport,urgent,total}=calcB(bk);
    grand+=total;
    const svcs=(bk.services||[]).map(s=>SVC[s]||s).join('＋');
    txt+=`【訂單 ${i+1}】飼主：${bk.ownerName}｜寵物：${bk.petName}\n`;
    txt+=`日期：${bk.startDate} ～ ${bk.endDate}（${bk.days}天 × ${bk.tpd}次/天）\n`;
    txt+=`服務：${svcs}`;
    if(bk.addons?.length)txt+=`｜加購：${bk.addons.join('、')}`;
    txt+=`\n每次費用：$${per} × ${bk.tpd}次 × ${bk.days}天 = $${sub}`;
    if(urgent>0)txt+=`\n急件加收：$${urgent}`;
    if(transport>0)txt+=`\n車馬費：$${transport}`;
    txt+=`\n本單合計：$${total}\n\n`;
  });
  txt+=`${'─'.repeat(44)}\n完成訂單：${cases.length} 件\n服務天數：${cases.reduce((s,x)=>s+(x.days||0),0)} 天\n本期薪資：$${grand.toLocaleString()}\n`;
  showExp(`${name} 薪資明細（${m}）`,txt);
}

function exportAllSalary(){
  const month=document.getElementById('salMonth').value;
  const m=month||'全部月份';
  let txt=`【貓窩裏寵物褓姆】全體薪資總表\n月份：${m}\n匯出：${new Date().toLocaleString('zh-TW')}\n${'═'.repeat(44)}\n\n`;
  SITTERS_LIST.forEach(s=>{
    const cases=getB().filter(x=>x.assignedTo===s&&x.status==='已完成'&&(!month||x.startDate.startsWith(month)));
    const total=cases.reduce((sum,x)=>sum+calcB(x).total,0);
    txt+=`${AVA[s]} ${s}（${ROLES[s]}）：完成 ${cases.length} 件｜薪資 $${total.toLocaleString()}\n`;
  });
  const grand=SITTERS_LIST.reduce((sum,s)=>{
    return sum+getB().filter(x=>x.assignedTo===s&&x.status==='已完成'&&(!month||x.startDate.startsWith(month))).reduce((s2,x)=>s2+calcB(x).total,0);
  },0);
  txt+=`${'─'.repeat(44)}\n全體合計：$${grand.toLocaleString()}\n`;
  showExp('全體薪資總表',txt);
}

function exportAll(){
  const b=getB();
  let txt=`貓窩裏 全部預約\n匯出：${new Date().toLocaleString('zh-TW')}\n${'─'.repeat(50)}\n\n`;
  b.forEach((bk,i)=>{
    const{total}=calcB(bk);
    txt+=`[${i+1}] ${bk.ownerName} | ${bk.petName} | ${bk.startDate}~${bk.endDate} | $${total} | ${bk.assignedTo||'未指派'} | ${bk.status}\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
  a.download=`貓窩裏預約_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'')}.txt`;
  a.click();
}

// COUPONS
function renderCoupons(){
  const f=document.getElementById('couponFilter').value;
  let coupons=getCoupons();
  if(f==='valid')coupons=coupons.filter(c=>!c.used);
  if(f==='used')coupons=coupons.filter(c=>c.used);
  coupons.sort((a,b)=>b.code.localeCompare(a.code));
  const grid=document.getElementById('couponGrid');
  if(!coupons.length){grid.innerHTML=`<div style="color:var(--tl);padding:20px;">尚無折抵券 🎟</div>`;return;}
  grid.innerHTML=coupons.map(c=>`
    <div class="coupon-row${c.used?' used':''}">
      <div>
        <div class="cr-code">${c.code}</div>
        <div class="cr-pet">${c.petName} 的主人</div>
        <div class="cr-date">開立 ${c.created} ｜ 到期 ${c.expire}</div>
      </div>
      <div class="cr-status ${c.used?'crs-used':'crs-ok'}">${c.used?'已使用':'有效'}</div>
    </div>
  `).join('');
}

// REVIEWS ADMIN
function renderReviewsAdmin(){
  const reviews=getReviews().sort((a,b)=>b.ts-a.ts);
  const list=document.getElementById('reviewListAdmin');
  if(!list)return;
  if(!reviews.length){list.innerHTML=`<div style="color:var(--tl);padding:20px;">尚無客戶好評 ⭐</div>`;return;}
  list.innerHTML=reviews.map(r=>`
    <div class="review-row">
      <div class="rr-head">
        <span class="rr-stars">${r.rating}</span>
        <span class="rr-pet">${r.petName} (${r.petType})</span>
        <span class="badge bg">${r.sitter}</span>
        <span class="badge bp">${r.service}</span>
        <span class="rr-sitter">— ${r.author}</span>
      </div>
      <div class="rr-comment">✨ 最滿意：${r.best}${r.comment?`<br>💬 「${r.comment}」`:''}</div>
    </div>
  `).join('');
}

// PAGE SWITCH
function switchPage(page,el){
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  ['orders','salary','coupons','reviews'].forEach(p=>{
    document.getElementById(`page-${p}`).style.display=p===page?'block':'none';
  });
  const titles={orders:'📋 訂單管理',salary:'💰 薪資計算',coupons:'🎟 折抵券',reviews:'⭐ 好評管理'};
  document.getElementById('pageTitle').textContent=titles[page]||'';
  if(page==='salary')renderSalary();
  if(page==='coupons')renderCoupons();
  if(page==='reviews')renderReviewsAdmin();
}

function showExp(title,txt){
  document.getElementById('exportTitle').textContent=title;
  document.getElementById('exportTxt').textContent=txt;
  document.getElementById('exportMod').classList.add('show');
}
function copyExp(){navigator.clipboard.writeText(document.getElementById('exportTxt').textContent).then(()=>alert('已複製 ✓'));}
function dlExp(){
  const txt=document.getElementById('exportTxt').textContent;
  const title=document.getElementById('exportTitle').textContent;
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));
  a.download=title.replace(/[\s\(\)]/g,'_')+'.txt';
  a.click();
}
function closeM(id){document.getElementById(id).classList.remove('show');}
</script>
</body>
