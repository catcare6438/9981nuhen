<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓窩裏｜保母專區</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E1A14;--bg2:#142018;--card:#1C2C20;--border:#2A4032;
  --p1:#FF8FA3;--p2:#FFB6C1;
  --g1:#4ECDC4;--g2:#A8E6CF;--g3:#D4F5E9;
  --y:#FFE66D;--o:#FF9F1C;--r:#FF6B6B;
  --t:#E8F5EE;--tl:#7EB89A;--tw:#fff;
  --sh:0 4px 24px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;}

/* LOGIN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 40%,#142A1C 0%,#0E1A14 70%);}
.login-box{background:var(--card);border:2px solid var(--border);border-radius:24px;
  padding:44px 36px;text-align:center;width:380px;box-shadow:0 24px 64px rgba(0,0,0,.6);}
.login-ico{font-size:3rem;margin-bottom:12px;}
.login-title{font-size:1.4rem;font-weight:900;color:var(--g1);margin-bottom:4px;}
.login-sub{font-size:.8rem;color:var(--tl);margin-bottom:22px;}
.login-in{width:100%;padding:12px 16px;background:var(--bg2);border:2px solid var(--border);
  border-radius:12px;color:var(--t);font-size:.95rem;font-family:inherit;outline:none;
  transition:border .2s;margin-bottom:10px;}
.login-in:focus{border-color:var(--g1);}
.login-sel{width:100%;padding:12px 16px;background:var(--bg2);border:2px solid var(--border);
  border-radius:12px;color:var(--t);font-size:.95rem;font-family:inherit;outline:none;
  margin-bottom:12px;cursor:pointer;}
.login-btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--g1),#2E9E96);
  color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:900;
  font-family:inherit;cursor:pointer;transition:all .2s;}
.login-btn:hover{opacity:.9;transform:translateY(-1px);}
.login-err{color:var(--r);font-size:.8rem;margin-top:8px;display:none;}

/* MAIN */
#mainScreen{display:none;}
.topbar{background:var(--bg2);border-bottom:2px solid var(--border);padding:13px 22px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.topbar-l{display:flex;align-items:center;gap:12px;}
.sitter-av-sm{font-size:1.8rem;}
.sitter-nm{font-weight:900;color:var(--g1);font-size:1rem;}
.sitter-role{font-size:.72rem;color:var(--tl);}
.btn{padding:8px 16px;border-radius:20px;border:none;cursor:pointer;font-size:.8rem;font-weight:700;font-family:inherit;transition:all .2s;}
.btn-g{background:var(--g1);color:#000;}
.btn-o{background:transparent;border:2px solid var(--border);color:var(--tl);}
.btn-o:hover{border-color:var(--g1);color:var(--g1);}
.btn-p{background:var(--p1);color:#fff;}

/* TABS */
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:4px;padding:10px 20px;flex-wrap:wrap;}
.tab{padding:8px 18px;border-radius:20px;cursor:pointer;font-size:.8rem;font-weight:700;color:var(--tl);transition:all .2s;}
.tab.on{background:var(--g1);color:#000;}

/* CONTENT */
.content{padding:22px;max-width:960px;margin:0 auto;}

/* STATS ROW */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;text-align:center;}
.stat-n{font-size:1.7rem;font-weight:900;color:var(--g1);}
.stat-l{font-size:.72rem;color:var(--tl);margin-top:4px;}

/* CASE CARDS */
.case-list{display:flex;flex-direction:column;gap:14px;}
.case-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;position:relative;}
.case-card.active{border-color:var(--g1);}
.case-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.case-info{flex:1;}
.case-title{font-weight:900;font-size:.95rem;color:var(--t);margin-bottom:4px;}
.case-meta{font-size:.76rem;color:var(--tl);line-height:1.7;}
.case-fee{font-size:1.1rem;font-weight:900;color:var(--g1);white-space:nowrap;}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700;}
.bw{background:rgba(255,230,109,.15);color:var(--y);border:1px solid var(--y);}
.bo{background:rgba(78,205,196,.15);color:var(--g1);border:1px solid var(--g1);}
.bd{background:rgba(180,180,180,.1);color:#888;border:1px solid #555;}
.case-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px dashed var(--border);}
.abtn{padding:7px 14px;border-radius:10px;border:none;cursor:pointer;font-size:.78rem;font-weight:700;font-family:inherit;}
.ab-g{background:rgba(78,205,196,.15);color:var(--g1);border:1px solid var(--g1);}
.ab-p{background:rgba(255,143,163,.15);color:var(--p1);border:1px solid var(--p1);}

/* REPORT MODAL */
.m-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:999;
  align-items:flex-start;justify-content:center;backdrop-filter:blur(4px);overflow-y:auto;padding:20px 0;}
.m-ov.show{display:flex;}
.m-box{background:var(--card);border:2px solid var(--border);border-radius:20px;
  padding:26px;width:600px;max-width:96vw;margin:auto;}
.m-box h3{color:var(--g1);margin-bottom:18px;}
.m-section{margin-bottom:18px;}
.m-section-title{font-size:.82rem;font-weight:700;color:var(--tl);margin-bottom:10px;
  display:flex;align-items:center;gap:6px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.m-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:480px){.m-grid2{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-size:.76rem;color:var(--tl);font-weight:600;}
.field select,.field textarea,.field input{
  padding:10px 12px;background:var(--bg2);border:1px solid var(--border);
  border-radius:10px;color:var(--t);font-family:inherit;font-size:.85rem;outline:none;
  transition:border .2s;resize:vertical;}
.field select:focus,.field textarea:focus,.field input:focus{border-color:var(--g1);}
.btn-row{display:flex;gap:10px;margin-top:6px;}
.btn-row .btn{flex:1;padding:11px;border-radius:12px;font-size:.88rem;}

/* REPORT VIEW */
.report-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
.report-date{font-weight:700;color:var(--g1);font-size:.9rem;margin-bottom:10px;}
.report-section{margin-bottom:12px;}
.report-label{font-size:.72rem;color:var(--tl);font-weight:700;margin-bottom:4px;}
.report-val{font-size:.83rem;line-height:1.7;}
.report-photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.photo-link{background:rgba(78,205,196,.15);border:1px solid var(--g1);border-radius:8px;
  padding:6px 12px;font-size:.75rem;color:var(--g1);text-decoration:none;cursor:pointer;}

/* SALARY VIEW */
.salary-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:14px;}
.salary-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.83rem;}
.salary-row:last-of-type{border:none;}
.salary-v{color:var(--g1);font-weight:700;}
.salary-total{font-size:1.1rem;font-weight:900;color:var(--g1);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-ico">🐾</div>
    <div class="login-title">保母專區登入</div>
    <div class="login-sub">貓窩裏 到府寵物褓姆</div>
    <select class="login-sel" id="sitterSel">
      <option value="">-- 選擇您的名字 --</option>
      <option value="May">👩‍⚕️ May</option>
      <option value="Ying">🐱 Ying</option>
      <option value="小汶">🌟 小汶</option>
      <option value="菓菓">🍎 菓菓</option>
      <option value="小茹">🐕 小茹</option>
      <option value="阿瑛">🌺 阿瑛</option>
    </select>
    <input class="login-in" type="password" id="sitterPw" placeholder="個人密碼" onkeydown="if(event.key==='Enter')sitterLogin()">
    <button class="login-btn" onclick="sitterLogin()">登入保母專區</button>
    <div class="login-err" id="sitterErr">名字或密碼錯誤 🐾</div>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen">
  <div class="topbar">
    <div class="topbar-l">
      <div class="sitter-av-sm" id="topAv"></div>
      <div>
        <div class="sitter-nm" id="topName"></div>
        <div class="sitter-role" id="topRole"></div>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <a href="index.html" class="btn btn-o">← 前台</a>
      <button class="btn btn-o" onclick="sitterLogout()">登出</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab on" onclick="switchTab('cases',this)">📋 我的案件</div>
    <div class="tab" onclick="switchTab('salary',this)">💰 薪資查詢</div>
    <div class="tab" onclick="switchTab('reports',this)">📝 我的回報</div>
  </div>
  <div class="content">
    <div class="stats" id="sitterStats"></div>
    <div id="tab-cases"><div class="case-list" id="caseList"></div></div>
    <div id="tab-salary" style="display:none;"><div id="salaryView"></div></div>
    <div id="tab-reports" style="display:none;"><div id="reportList"></div></div>
  </div>
</div>

<!-- REPORT MODAL -->
<div class="m-ov" id="reportMod">
  <div class="m-box">
    <h3>📝 今日照護回報</h3>
    <input type="hidden" id="reportBookId">
    <input type="hidden" id="reportBookName">

    <div class="m-section">
      <div class="m-section-title">📅 基本資訊</div>
      <div class="m-grid2">
        <div class="field"><label>回報日期</label><input type="date" id="rDate"></div>
        <div class="field"><label>服務時段</label>
          <select id="rTime">
            <option>08:00 - 08:30</option><option>09:00 - 09:30</option>
            <option>10:00 - 10:30</option><option>12:00 - 12:30</option>
            <option>14:00 - 14:30</option><option>16:00 - 16:30</option>
            <option>18:00 - 18:30</option><option>20:00 - 20:30</option>
          </select>
        </div>
      </div>
    </div>

    <div class="m-section">
      <div class="m-section-title">🌿 整體狀況</div>
      <div class="m-grid2">
        <div class="field"><label>精神狀況</label>
          <select id="rSpirit"><option>正常</option><option>略顯疲憊</option><option>精神不振</option><option>非常活躍</option></select></div>
        <div class="field"><label>活動力</label>
          <select id="rActivity"><option>正常</option><option>偏低</option><option>偏高</option><option>幾乎不動</option></select></div>
        <div class="field"><label>眼睛/鼻子</label>
          <select id="rEyes"><option>正常</option><option>略有分泌物</option><option>有異常分泌物</option><option>紅腫</option></select></div>
        <div class="field"><label>互動狀況</label>
          <select id="rInteract"><option>友善主動</option><option>正常</option><option>有些害羞</option><option>較為退縮</option></select></div>
      </div>
    </div>

    <div class="m-section">
      <div class="m-section-title">💩 排泄狀況</div>
      <div class="m-grid2">
        <div class="field"><label>糞便狀況</label>
          <select id="rPoop"><option>正常</option><option>未發現</option><option>軟便</option><option>水便</option><option>便秘跡象</option></select></div>
        <div class="field"><label>尿液狀況</label>
          <select id="rUrine"><option>正常</option><option>尿量偏少</option><option>尿量偏多</option><option>有血尿跡象</option></select></div>
        <div class="field"><label>貓砂/墊子</label>
          <select id="rLitter"><option>已清理</option><option>量少未清</option><option>已更換新袋</option><option>濕墊已更換</option></select></div>
        <div class="field"><label>其他排泄問題</label>
          <select id="rPoopExtra"><option>無</option><option>有在墊子外尿尿，已擦拭清潔</option><option>有嘔吐物，已清理</option><option>有其他分泌物</option></select></div>
      </div>
    </div>

    <div class="m-section">
      <div class="m-section-title">🍽 飲食狀況</div>
      <div class="m-grid2">
        <div class="field"><label>飼料</label>
          <select id="rFood"><option>已補足</option><option>食慾正常</option><option>食量偏少</option><option>完全不吃</option><option>飼料機運作正常</option></select></div>
        <div class="field"><label>飲水</label>
          <select id="rWater"><option>飲水機正常，水量足</option><option>水量偏少已補充</option><option>有喝水</option><option>飲水量偏少</option></select></div>
      </div>
    </div>

    <div class="m-section">
      <div class="m-section-title">🧹 今日服務內容</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;" id="serviceCheckboxes">
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="清理糞便尿尿"> 清理糞便尿尿</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="更換貓砂/墊子"> 更換貓砂/墊子</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="檢查飼料機/飲水機"> 檢查飼料機/飲水機</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="陪伴互動與觀察"> 陪伴互動與觀察</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="餵藥完成"> 餵藥完成</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="點藥完成"> 點藥完成</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="散步完成"> 散步完成</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="剪指甲完成"> 剪指甲完成</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="收信完成"> 收信</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="澆花完成"> 澆花</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="倒垃圾完成"> 倒垃圾</label>
      </div>
    </div>

    <div class="m-section">
      <div class="m-section-title">🐱 毛孩個別互動紀錄</div>
      <div class="field">
        <label>逐一記錄每隻毛孩的互動情況</label>
        <textarea id="rPetDetail" rows="4" placeholder="例：🔸橘寶 — 今天很喜歡摸摸，玩逗貓棒超投入&#10;🔸小黑 — 精神不錯，自己去玩球&#10;🔸花花 — 有點怕生，在角落觀察"></textarea>
      </div>
    </div>

    <div class="m-section">
      <div class="m-section-title">💞 情緒 & 小瞬間</div>
      <div class="field">
        <label>今天的特別觀察或可愛瞬間</label>
        <textarea id="rMoment" rows="3" placeholder="例：小七想玩球，但看到恩恩也要搶就停下來了，超可愛！"></textarea>
      </div>
    </div>

    <div class="m-section">
      <div class="m-section-title">🔐 環境安全巡檢</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;" id="safetyCheckboxes">
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="飼料機運作正常"> 飼料機正常</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="飲水機正常"> 飲水機正常</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="飼料存量充足"> 飼料充足</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="窗戶確認關上"> 窗戶關好</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="鐵捲門關閉"> 鐵捲門關</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:.8rem;cursor:pointer;"><input type="checkbox" value="寵物空間安全確認"> 寵物空間安全</label>
      </div>
    </div>

    <div class="m-section">
      <div class="m-section-title">📸 照片 & 影片</div>
      <div class="field">
        <label>照片/影片連結（Google 相簿、LINE、雲端等）</label>
        <textarea id="rPhotos" rows="2" placeholder="貼上連結，可多行&#10;例：https://photos.google.com/...&#10;清潔前後對比 + 毛孩當日美照"></textarea>
      </div>
    </div>

    <div class="m-section">
      <div class="m-section-title">📩 結尾備注</div>
      <div class="field">
        <label>給飼主的補充說明（選填）</label>
        <textarea id="rNotes" rows="2" placeholder="若有需要特別留意的地方，歡迎告訴我，我們會再為毛孩多注意 🐾"></textarea>
      </div>
    </div>

    <div class="btn-row">
      <button class="btn btn-g" onclick="submitReport()">送出回報</button>
      <button class="btn btn-o" onclick="closeM('reportMod')">取消</button>
    </div>
  </div>
</div>

<!-- REPORT PREVIEW MODAL -->
<div class="m-ov" id="previewMod">
  <div class="m-box" style="width:620px;">
    <h3>📋 回報預覽</h3>
    <div id="previewContent" style="font-size:.82rem;line-height:1.9;color:var(--tl);background:var(--bg2);border-radius:10px;padding:16px;max-height:420px;overflow-y:auto;white-space:pre-wrap;font-family:monospace;"></div>
    <div class="btn-row" style="margin-top:14px;">
      <button class="btn btn-g" onclick="copyPreview()">📋 複製回報</button>
      <button class="btn btn-o" onclick="closeM('previewMod')">關閉</button>
    </div>
  </div>
</div>

<script>
const SITTERS={
  May:{pw:'may0001',role:'首席顧問',av:'👩‍⚕️'},
  Ying:{pw:'ying01',role:'資深貓咪照護',av:'🐱'},
  小汶:{pw:'app55',role:'老年寵物照護',av:'🌟'},
  菓菓:{pw:'app3811',role:'中途志工',av:'🍎'},
  小茹:{pw:'app66',role:'中途志工',av:'🐕'},
  阿瑛:{pw:'app11',role:'中途志工',av:'🌺'},
};
const SVC={companion:'到府陪伴',walk:'散步',both:'陪伴＋散步'};
const ADDON={餵藥:50,點藥:50,舒緩按摩:100,剪指甲:80,協助排便導尿:80,收信:30,澆花:30,倒垃圾:50};
const SVCPRICE={companion:300,walk:200,both:500};

let ME=null;

function sitterLogin(){
  const name=document.getElementById('sitterSel').value;
  const pw=document.getElementById('sitterPw').value;
  const info=SITTERS[name];
  if(!info||pw!==info.pw){
    document.getElementById('sitterErr').style.display='block';
    document.getElementById('sitterPw').value='';
    return;
  }
  ME={name,info};
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('mainScreen').style.display='block';
  document.getElementById('topAv').textContent=info.av;
  document.getElementById('topName').textContent=name;
  document.getElementById('topRole').textContent=info.role;
  renderMain();
}
function sitterLogout(){
  ME=null;
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('mainScreen').style.display='none';
  document.getElementById('sitterPw').value='';
  document.getElementById('sitterErr').style.display='none';
}

function getB(){return JSON.parse(localStorage.getItem('bookings')||'[]');}
function getReports(){return JSON.parse(localStorage.getItem('reports')||'[]');}
function saveReports(r){localStorage.setItem('reports',JSON.stringify(r));}

function calcB(b){
  let base=(b.services||[]).reduce((s,k)=>s+(SVCPRICE[k]||0),0);
  let addon=(b.addons||[]).reduce((s,a)=>s+(ADDON[a]||0),0);
  let extra=0;if((b.catCount||1)>2)extra+=(b.catCount-2)*30;if((b.dogCount||0)>2)extra+=(b.dogCount-2)*30;
  const per=base+addon+extra;
  const sub=per*(b.tpd||1)*(b.days||0);
  return{per,sub,transport:b.transport||0,urgent:b.urgent||0,total:sub+(b.transport||0)+(b.urgent||0)};
}

function renderMain(){
  const myCases=getB().filter(b=>b.assignedTo===ME.name);
  const done=myCases.filter(b=>b.status==='已完成');
  const totalDays=done.reduce((s,b)=>s+(b.days||0),0);
  const totalRev=done.reduce((s,b)=>s+calcB(b).total,0);
  const myReports=getReports().filter(r=>r.sitter===ME.name);

  document.getElementById('sitterStats').innerHTML=`
    <div class="stat"><div class="stat-n">${myCases.length}</div><div class="stat-l">全部案件</div></div>
    <div class="stat"><div class="stat-n" style="color:var(--y)">${myCases.filter(b=>b.status==='已確認'||b.status==='服務中').length}</div><div class="stat-l">進行中</div></div>
    <div class="stat"><div class="stat-n" style="color:#888">${done.length}</div><div class="stat-l">已完成</div></div>
    <div class="stat"><div class="stat-n">${totalDays}</div><div class="stat-l">服務天數</div></div>
    <div class="stat"><div class="stat-n">$${totalRev.toLocaleString()}</div><div class="stat-l">完成金額</div></div>
    <div class="stat"><div class="stat-n">${myReports.length}</div><div class="stat-l">回報次數</div></div>
  `;
  renderCases();
}

function renderCases(){
  const myCases=getB().filter(b=>b.assignedTo===ME.name);
  const cl=document.getElementById('caseList');
  if(!myCases.length){cl.innerHTML=`<div style="text-align:center;padding:40px;color:var(--tl);">目前沒有指派案件 🐾</div>`;return;}
  const statusCls={待確認:'bw',已確認:'bo',服務中:'bo',已完成:'bd',已取消:'bd'};
  cl.innerHTML=myCases.map(b=>{
    const{total}=calcB(b);
    const svcs=(b.services||[]).map(s=>SVC[s]||s).join('＋');
    const myReports=getReports().filter(r=>r.bookId===b.id);
    return `<div class="case-card ${b.status==='已確認'||b.status==='服務中'?'active':''}">
      <div class="case-head">
        <div class="case-info">
          <div class="case-title">🐾 ${b.petName} — ${b.ownerName} 飼主 <span class="badge ${statusCls[b.status]||'bd'}">${b.status}</span></div>
          <div class="case-meta">
            📅 ${b.startDate} ～ ${b.endDate}（${b.days}天 × 每天${b.tpd}次）<br>
            🏠 ${svcs}${b.addons?.length?'｜加購：'+b.addons.join('、'):''}<br>
            📍 ${b.ownerAddr||'—'}<br>
            📱 ${b.ownerPhone}${b.ownerLine?' ｜ LINE: '+b.ownerLine:''}<br>
            🐱 寵物：${b.petName}${b.petBreed?' ('+b.petBreed+')':''}<br>
            ${b.petInfo?`⚕️ 健康注意：${b.petInfo}<br>`:''}
            📝 已回報 ${myReports.length} 次
          </div>
        </div>
        <div style="text-align:right;">
          <div class="case-fee">$${total}</div>
          <div style="font-size:.7rem;color:var(--tl);margin-top:4px;">${b.days}天服務</div>
        </div>
      </div>
      <div class="case-actions">
        <button class="abtn ab-g" onclick="openReport(${b.id},'${b.petName} — ${b.ownerName}')">📝 新增回報</button>
        <button class="abtn ab-p" onclick="viewReports(${b.id})">📋 查看回報（${myReports.length}）</button>
      </div>
    </div>`;
  }).join('');
}

function renderSalaryView(){
  const done=getB().filter(b=>b.assignedTo===ME.name&&b.status==='已完成');
  const sv=document.getElementById('salaryView');
  if(!done.length){sv.innerHTML=`<div style="text-align:center;padding:40px;color:var(--tl);">尚無已完成案件 🐾</div>`;return;}
  const grand=done.reduce((s,b)=>s+calcB(b).total,0);
  sv.innerHTML=`
    <div class="salary-card">
      <div class="salary-row"><span>已完成案件</span><span class="salary-v">${done.length} 件</span></div>
      <div class="salary-row"><span>服務天數</span><span class="salary-v">${done.reduce((s,b)=>s+(b.days||0),0)} 天</span></div>
      <div class="salary-row"><span>服務次數</span><span class="salary-v">${done.reduce((s,b)=>s+(b.days||0)*(b.tpd||1),0)} 次</span></div>
      <div class="salary-row" style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);">
        <span class="salary-total">總計薪資</span><span class="salary-total">$${grand.toLocaleString()}</span>
      </div>
    </div>
    ${done.map((b,i)=>{
      const{per,sub,transport,urgent,total}=calcB(b);
      const svcs=(b.services||[]).map(s=>SVC[s]||s).join('＋');
      return `<div class="salary-card">
        <div style="font-weight:700;color:var(--g1);margin-bottom:10px;">[${i+1}] ${b.petName} — ${b.ownerName}</div>
        <div class="salary-row"><span>日期</span><span class="salary-v">${b.startDate} ～ ${b.endDate}</span></div>
        <div class="salary-row"><span>服務</span><span class="salary-v">${svcs}</span></div>
        <div class="salary-row"><span>${b.days}天 × ${b.tpd}次/天</span><span class="salary-v">$${per}/次 × $${sub}</span></div>
        ${urgent>0?`<div class="salary-row"><span>急件</span><span class="salary-v">$${urgent}</span></div>`:''}
        ${transport>0?`<div class="salary-row"><span>車馬費</span><span class="salary-v">$${transport}</span></div>`:''}
        <div class="salary-row" style="margin-top:6px;border-top:1px solid var(--border);padding-top:6px;">
          <span>本單合計</span><span class="salary-v">$${total}</span>
        </div>
      </div>`;
    }).join('')}
  `;
}

function renderReportList(){
  const reps=getReports().filter(r=>r.sitter===ME.name).sort((a,b)=>b.ts-a.ts);
  const rl=document.getElementById('reportList');
  if(!reps.length){rl.innerHTML=`<div style="text-align:center;padding:40px;color:var(--tl);">尚無回報紀錄 📝</div>`;return;}
  rl.innerHTML=reps.map(r=>`
    <div class="report-card">
      <div class="report-date">📅 ${r.date} ${r.time} ｜ ${r.bookName}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:10px;">
        <div><div class="report-label">🌿 精神</div><div class="report-val">${r.spirit}</div></div>
        <div><div class="report-label">🏃 活動力</div><div class="report-val">${r.activity}</div></div>
        <div><div class="report-label">💩 糞便</div><div class="report-val">${r.poop}</div></div>
        <div><div class="report-label">🚿 尿液</div><div class="report-val">${r.urine}</div></div>
        <div><div class="report-label">🍽 飼料</div><div class="report-val">${r.food}</div></div>
        <div><div class="report-label">💧 飲水</div><div class="report-val">${r.water}</div></div>
      </div>
      ${r.services?.length?`<div class="report-section"><div class="report-label">✅ 今日服務</div><div class="report-val">${r.services.map(s=>'✔ '+s).join('・')}</div></div>`:''}
      ${r.petDetail?`<div class="report-section"><div class="report-label">🐱 毛孩互動</div><div class="report-val" style="white-space:pre-wrap;">${r.petDetail}</div></div>`:''}
      ${r.moment?`<div class="report-section"><div class="report-label">✨ 小瞬間</div><div class="report-val">${r.moment}</div></div>`:''}
      ${r.safety?.length?`<div class="report-section"><div class="report-label">🔐 安全巡檢</div><div class="report-val">${r.safety.map(s=>'✔ '+s).join('・')}</div></div>`:''}
      ${r.photos?`<div class="report-section"><div class="report-label">📸 照片連結</div><div class="report-photos">${r.photos.split('\n').filter(Boolean).map(p=>`<a class="photo-link" href="${p}" target="_blank">🖼 開啟</a>`).join('')}</div></div>`:''}
      ${r.notes?`<div class="report-section"><div class="report-label">📩 備注</div><div class="report-val">${r.notes}</div></div>`:''}
      <button class="abtn ab-g" style="margin-top:8px;" onclick="previewReport(${r.ts})">👁 預覽完整回報</button>
    </div>
  `).join('');
}

// OPEN REPORT MODAL
function openReport(bookId,bookName){
  document.getElementById('reportBookId').value=bookId;
  document.getElementById('reportBookName').value=bookName;
  document.getElementById('rDate').value=new Date().toISOString().split('T')[0];
  document.getElementById('reportMod').classList.add('show');
}

function submitReport(){
  const bookId=parseInt(document.getElementById('reportBookId').value);
  const bookName=document.getElementById('reportBookName').value;
  const services=Array.from(document.querySelectorAll('#serviceCheckboxes input:checked')).map(c=>c.value);
  const safety=Array.from(document.querySelectorAll('#safetyCheckboxes input:checked')).map(c=>c.value);
  const r={
    ts:Date.now(),bookId,bookName,sitter:ME.name,
    date:document.getElementById('rDate').value,
    time:document.getElementById('rTime').value,
    spirit:document.getElementById('rSpirit').value,
    activity:document.getElementById('rActivity').value,
    eyes:document.getElementById('rEyes').value,
    interact:document.getElementById('rInteract').value,
    poop:document.getElementById('rPoop').value,
    urine:document.getElementById('rUrine').value,
    litter:document.getElementById('rLitter').value,
    poopExtra:document.getElementById('rPoopExtra').value,
    food:document.getElementById('rFood').value,
    water:document.getElementById('rWater').value,
    services,safety,
    petDetail:document.getElementById('rPetDetail').value,
    moment:document.getElementById('rMoment').value,
    photos:document.getElementById('rPhotos').value,
    notes:document.getElementById('rNotes').value,
  };
  const reps=getReports();
  reps.push(r);
  saveReports(reps);
  closeM('reportMod');
  // reset checkboxes
  document.querySelectorAll('#serviceCheckboxes input,#safetyCheckboxes input').forEach(c=>c.checked=false);
  document.getElementById('rPetDetail').value='';
  document.getElementById('rMoment').value='';
  document.getElementById('rPhotos').value='';
  document.getElementById('rNotes').value='';
  renderMain();
  alert('回報已送出 ✓');
}

function viewReports(bookId){
  const b=getB().find(x=>x.id===bookId);
  const reps=getReports().filter(r=>r.bookId===bookId&&r.sitter===ME.name);
  if(!reps.length){alert('此案件尚無回報');return;}
  // show in reports tab
  switchTab('reports',document.querySelectorAll('.tab')[2]);
  renderReportList();
  document.getElementById('tab-reports').scrollIntoView({behavior:'smooth'});
}

function previewReport(ts){
  const r=getReports().find(x=>x.ts===ts);
  if(!r)return;
  let txt=`【貓窩裏到府褓姆】照護日誌\n`;
  txt+=`日期：${r.date}（${r.time}）\n保母：${r.sitter}\n案件：${r.bookName}\n`;
  txt+=`${'—'.repeat(38)}\n\n`;
  txt+=`🌿 今日整體狀況\n精神：${r.spirit}　活動力：${r.activity}\n眼睛/鼻子：${r.eyes}　互動：${r.interact}\n\n`;
  txt+=`💩 排泄狀況\n糞便：${r.poop}　尿液：${r.urine}\n貓砂：${r.litter}`;
  if(r.poopExtra!=='無')txt+=`\n補充：${r.poopExtra}`;
  txt+=`\n\n🍽 飲食狀況\n飼料：${r.food}　飲水：${r.water}\n\n`;
  if(r.services?.length)txt+=`🧹 今日服務\n${r.services.map(s=>'✔ '+s).join('\n')}\n\n`;
  if(r.petDetail)txt+=`🐱 毛孩互動紀錄\n${r.petDetail}\n\n`;
  if(r.moment)txt+=`✨ 小瞬間\n${r.moment}\n\n`;
  if(r.safety?.length)txt+=`🔐 環境安全巡檢\n${r.safety.map(s=>'✔ '+s).join('\n')}\n\n`;
  if(r.photos)txt+=`📸 照片/影片連結\n${r.photos}\n\n`;
  txt+=`${'—'.repeat(38)}\n`;
  txt+=`📩 今日照護回報完成\n`;
  if(r.notes)txt+=`補充：${r.notes}\n`;
  txt+=`若有任何需要特別留意的地方，歡迎告訴我，我們會再為毛孩多加注意 🐾`;
  document.getElementById('previewContent').textContent=txt;
  document.getElementById('previewMod').classList.add('show');
}
function copyPreview(){
  navigator.clipboard.writeText(document.getElementById('previewContent').textContent).then(()=>alert('已複製 ✓'));
}

function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('tab-cases').style.display=t==='cases'?'block':'none';
  document.getElementById('tab-salary').style.display=t==='salary'?'block':'none';
  document.getElementById('tab-reports').style.display=t==='reports'?'block':'none';
  if(t==='salary')renderSalaryView();
  if(t==='reports')renderReportList();
}
function closeM(id){document.getElementById(id).classList.remove('show');}
</script>
</body>
</html>
