<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>貓窩裏🐾 雲端專業回報系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root{--p1:#FF8FA3;--bg:#FFF5F8;--border:#FFD6E0;--t:#3D2B35;--tl:#8B687A;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--t);line-height:1.5;padding-bottom:80px;}
        
        /* 可愛導航與分頁 */
        .nav{background:#fff;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid var(--border);position:sticky;top:0;z-index:100;}
        .tabs{display:flex;background:#FFE8EF;padding:5px;margin:15px;border-radius:20px;gap:5px;}
        .tab{flex:1;text-align:center;padding:12px;font-weight:bold;cursor:pointer;border-radius:15px;color:var(--tl);font-size:0.9rem;}
        .tab.active{background:var(--p1);color:white;box-shadow:0 4px 10px rgba(255,143,163,0.2);}
        
        /* 任務卡片 */
        .container{padding:0 15px;}
        .card{background:#fff;border:2px solid var(--border);border-radius:22px;padding:20px;margin-bottom:15px;box-shadow:0 6px 15px rgba(0,0,0,0.02);position:relative;}
        .c-title{font-size:1.2rem;font-weight:900;color:var(--p1);margin-bottom:8px;}
        .btn-main{width:100%;padding:14px;background:linear-gradient(135deg,var(--p1),#FF6B8A);color:white;border:none;border-radius:15px;font-weight:900;cursor:pointer;font-size:1rem;}
        
        /* 回報彈窗樣式 */
        .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:flex-end;justify-content:center;backdrop-filter:blur(5px);}
        .m-box{background:#fff;width:100%;max-width:600px;border-radius:30px 30px 0 0;padding:25px;max-height:92vh;overflow-y:auto;}
        .sec{margin-bottom:15px;padding:15px;background:var(--bg);border-radius:20px;border:1.5px dashed var(--border);}
        .sec-label{font-weight:900;color:var(--p1);display:block;margin-bottom:8px;}
        input, select, textarea { width:100%; padding:12px; border-radius:12px; border:1.5px solid var(--border); margin-top:5px; outline:none; font-family:inherit;}
        
        /* 歷史紀錄細節 */
        .history-p{font-size:0.85rem; border-left:3px solid var(--p1); padding-left:12px; margin-top:10px; color:var(--tl);}
    </style>
</head>
<body>

<div id="loginScreen" style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:linear-gradient(160deg,#FFD0DF 0%,#FFF5F8 100%);">
    <div style="background:#fff; padding:40px; border-radius:30px; border:3px solid var(--border); text-align:center; width:340px; box-shadow:0 15px 35px rgba(0,0,0,0.1);">
        <h2 style="color:var(--p1); margin-bottom:20px;">貓窩裏🐾 雲端站</h2>
        <select id="sitterSel">
            <option value="Ying">🦊 Ying</option>
            <option value="小汶">🐰 小汶</option>
            <option value="菓菓">🦔 菓菓</option>
            <option value="小茹">🐿️ 小茹</option>
            <option value="阿瑛">🐶 阿瑛</option>
        </select>
        <input type="password" id="pwIn" placeholder="通關密碼 (715715)">
        <button class="btn-main" style="margin-top:20px;" onclick="doLogin()">連線系統 ✨</button>
    </div>
</div>

<div id="mainScreen" style="display:none;">
    <div class="nav">
        <b id="who" style="color:var(--p1); font-size:1.1rem;"></b>
        <button onclick="location.reload()" style="background:none; border:none; color:#999; font-weight:bold;">登出</button>
    </div>
    <div class="tabs">
        <div class="tab active" id="t1" onclick="switchTab(1, this)">📋 今日任務</div>
        <div class="tab" id="t2" onclick="switchTab(2, this)">📝 雲端紀錄</div>
    </div>
    <div class="container" id="viewArea"></div>
</div>

<div class="modal" id="reportModal">
    <div class="m-box">
        <h3 id="mTitle" style="text-align:center; color:var(--p1); margin-bottom:20px;">✨ 專業照護回報</h3>
        
        <div class="sec">
            <span class="sec-label">🌡️ 1. 環境數值</span>
            <input type="number" id="f_temp" placeholder="目前室溫°C">
            <input type="text" id="f_items" placeholder="備品補充 (如：砂剩2包)">
        </div>

        <div class="sec">
            <span class="sec-label">🍛 2. 飲食紀錄</span>
            <select id="f_food">
                <option value="全部吃完">😋 全部吃完</option>
                <option value="剩餘一點">🙂 剩餘一點</option>
                <option value="剩餘一半">😐 剩餘一半</option>
                <option value="幾乎沒吃">😰 幾乎沒吃</option>
            </select>
        </div>

        <div class="sec">
            <span class="sec-label">🩺 3. 毛孩狀態與備註</span>
            <textarea id="f_note" rows="5" placeholder="詳細記錄今天毛孩的精神、排泄狀況與互動細節..."></textarea>
        </div>

        <button class="btn-main" id="subBtn" onclick="submitToCloud()">確認無誤・同步雲端 💌</button>
        <button onclick="closeModal()" style="width:100%; border:none; background:none; margin-top:15px; color:#999; font-size:0.9rem;">返回修改</button>
    </div>
</div>

<script>
// --- 🔑 已自動帶入您的連線金鑰 ---
const SB_URL = "https://cswejuvithewfyhmisfc.supabase.co"; 
const SB_KEY = "sb_publishable_SHEt60Pl_LoqDHp2PLLqIg_ASjK72vz"; 
const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

const allCases = [
    { client: '陳小姐', pets: '咪咪(貓)', addr: '苓雅區...' },
    { client: '林先生', pets: '多多(狗)', addr: '左營區...' }
];

let curSitter = "";
let activeClient = "";
let editingId = null;

function doLogin() {
    if(document.getElementById('pwIn').value === "715715") {
        curSitter = document.getElementById('sitterSel').value;
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'block';
        document.getElementById('who').innerText = "📍 " + curSitter + " 保母";
        switchTab(1);
    } else { alert("密碼錯誤喔！🐾"); }
}

async function switchTab(n, el) {
    if(el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }
    const area = document.getElementById('viewArea');
    area.innerHTML = "<p style='text-align:center; padding:50px; color:#999;'>雲端連線中...</p>";

    if(n === 1) renderCases(area);
    else await renderHistory(area);
}

function renderCases(area) {
    area.innerHTML = allCases.map(c => `
        <div class="card">
            <div class="c-title">${c.client} 家</div>
            <p style="color:var(--tl); font-size:0.9rem;">🐾 毛孩：${c.pets}<br>📍 地址：${c.addr}</p>
            <button class="btn-main" style="margin-top:15px;" onclick="openModal('${c.client}')">開始照護之旅 🚀</button>
        </div>
    `).join('');
}

async function renderHistory(area) {
    const { data, error } = await supabaseClient.from('reports').select('*').eq('sitter_name', curSitter).order('created_at', {ascending: false});
    
    if(data && data.length > 0) {
        area.innerHTML = data.map(r => `
            <div class="card">
                <button onclick="loadForEdit(${r.id})" style="position:absolute; top:15px; right:15px; border:1.5px solid var(--p1); color:var(--p1); background:#fff; padding:4px 10px; border-radius:10px; font-size:0.75rem; font-weight:bold;">修改 ✏️</button>
                <div class="c-title" style="font-size:1rem;">${r.client_name} - 回報完成</div>
                <div class="history-p">
                    🌡️ 溫度：${r.temp}°C | 🍱 飲食：${r.food_status}<br>
                    📝 紀錄：${r.note || '未填寫'}<br>
                    📦 備品：${r.items || '正常'}<br>
                    <small style="color:#ccc;">存檔時間：${new Date(r.created_at).toLocaleString()}</small>
                </div>
            </div>
        `).join('');
    } else {
        area.innerHTML = "<p style='text-align:center; padding:50px; color:#999;'>雲端目前無紀錄 🌿</p>";
    }
}

function openModal(client) {
    editingId = null;
    activeClient = client;
    document.getElementById('mTitle').innerText = "✨ " + client + " 照護回報";
    document.getElementById('reportModal').style.display = 'flex';
}

async function loadForEdit(id) {
    const { data } = await supabaseClient.from('reports').select('*').eq('id', id).single();
    editingId = id;
    activeClient = data.client_name;
    document.getElementById('f_temp').value = data.temp;
    document.getElementById('f_food').value = data.food_status;
    document.getElementById('f_items').value = data.items;
    document.getElementById('f_note').value = data.note;
    document.getElementById('reportModal').style.display = 'flex';
}

function closeModal() {
    document.getElementById('reportModal').style.display = 'none';
    document.querySelectorAll('.modal input, .modal textarea').forEach(i => i.value = "");
}

async function submitToCloud() {
    const btn = document.getElementById('subBtn');
    btn.innerText = "連線中..."; btn.disabled = true;

    const row = {
        sitter_name: curSitter,
        client_name: activeClient,
        temp: document.getElementById('f_temp').value,
        food_status: document.getElementById('f_food').value,
        items: document.getElementById('f_items').value,
        note: document.getElementById('f_note').value
    };

    let response;
    if(editingId) {
        response = await supabaseClient.from('reports').update(row).eq('id', editingId);
    } else {
        response = await supabaseClient.from('reports').insert([row]);
    }

    if(response.error) {
        alert("同步失敗：" + response.error.message);
        btn.innerText = "重試一次"; btn.disabled = false;
    } else {
        alert("🎉 成功同步至雲端！");
        closeModal();
        switchTab(2);
        btn.innerText = "確認無誤・同步雲端 💌"; btn.disabled = false;
    }
}
</script>
</body>
</html>
